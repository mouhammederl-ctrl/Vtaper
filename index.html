/* ── APP SHELL ── */
#app{max-width:430px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* ── TOP BAR (fixed, shared) ── */

/* ── BOTTOM NAV ── */

.nav-btn.active{color:#4ECDC4}
.nav-btn .nav-icon{font-size:20px;line-height:1}
.nav-dot{width:4px;height:4px;background:#4ECDC4;border-radius:50%;margin-top:1px}

/* ── SCROLLABLE INNER ── */

.set-num{font-size:10px;font-weight:700;color:#8E8E93;width:20px;text-align:center;flex-shrink:0}

function detectSession(exs){
  if(!exs||!exs.length)return"REST";
  const c={};
  exs.forEach(ex=>{const lib=LIB.find(e=>e.id===ex.libId);if(!lib)return;const mg=MG.find(m=>m.id===lib.muscle);if(!mg)return;c[mg.session]=(c[mg.session]||0)+1;});
  if(!Object.keys(c).length)return"CUSTOM";
  return Object.entries(c).sort((a,b)=>b[1]-a[1])[0][0];
}

/* ── AUTH ── */
function getSecret(){let k=localStorage.getItem("vtaper_secret");if(!k){k=crypto.randomUUID();localStorage.setItem("vtaper_secret",k);}return k;}
function getMyProfileId(){return localStorage.getItem("vtaper_profile_id");}
function setMyProfileId(id){localStorage.setItem("vtaper_profile_id",id);}

/* ── FIRESTORE ── */
async function loadProfiles(){const s=await getDocs(collection(db,"profiles"));return s.docs.map(d=>({id:d.id,...d.data()}));}
async function loadWD(pid){const s=await getDoc(doc(db,"workoutData",pid));return s.exists()?s.data():{days:{},logs:{}};}
async function saveWD(pid,data){await setDoc(doc(db,"workoutData",pid),{...data,updatedAt:serverTimestamp()},{merge:false});}
async function loadNutData(pid){const s=await getDoc(doc(db,"nutritionData",pid));return s.exists()?s.data():{profile:{},foodLog:{}};}
async function saveNutData(pid,data){await setDoc(doc(db,"nutritionData",pid),{...data,updatedAt:serverTimestamp()},{merge:false});}

async function saveStatsData(pid,data){await setDoc(doc(db,"statsData",pid),{...data,updatedAt:serverTimestamp()},{merge:false});}
async function createProfile(name,emoji){const secret=getSecret();const id=name.toLowerCase().replace(/\s+/g,"_")+"_"+Date.now();const p={name,emoji,secretKey:secret,createdAt:serverTimestamp()};await setDoc(doc(db,"profiles",id),p);setMyProfileId(id);return{id,...p};}
async function deleteProfile(pid){
  await Promise.all([
    deleteDoc(doc(db,"profiles",pid)),
    deleteDoc(doc(db,"workoutData",pid)),
    deleteDoc(doc(db,"nutritionData",pid)),
    deleteDoc(doc(db,"statsData",pid)),
  ]);
  localStorage.removeItem("vtaper_profile_id");
}

function scheduleSave(){if(!S.isOwner||!S.currentProfile)return;clearTimeout(pendingSave);pendingSave=setTimeout(async()=>{try{await saveWD(S.currentProfile.id,S.workoutData);}catch(e){}},1000);}

function getLog(k){return S.workoutData.logs[k]||"";}

function lk(w,d,ei,si,f){return`w${w}_${d}_${ei}_s${si}_${f}`;}

function calcVolume(week,day){
  const exs=getDayExs(day);
  let total=0;
  exs.forEach((ex,ei)=>{
    const sets=ex.sets||3;
    for(let si=0;si<sets;si++){
      const w=parseFloat(getLog(lk(week,day,ei,si,"weight")))||0;
      const r=parseFloat(getLog(lk(week,day,ei,si,"reps")))||0;
      total+=w*r;
    }
  });
  return Math.round(total);
}

/* ── NUTRITION CALC (Mifflin-St Jeor) ── */
function calcTDEE(p){
  if(!p.weight||!p.height||!p.age||!p.sex)return null;
  const bmr=p.sex==="H"
    ?(10*p.weight)+(6.25*p.height)-(5*p.age)+5
    :(10*p.weight)+(6.25*p.height)-(5*p.age)-161;
  const factors={sedentaire:1.2,leger:1.375,modere:1.55,actif:1.725,tres_actif:1.9};
  const tdee=Math.round(bmr*(factors[p.activity]||1.375));
  const targets={seche:Math.round(tdee*0.8),maintien:tdee,bulk:Math.round(tdee*1.15)};
  return{bmr:Math.round(bmr),tdee,targets};
}
function calcMacros(calories,goal){
  // protein: 2g/kg bodyweight approx, fat: 25%, rest carbs
  const np=S.nutritionData.profile;
  const prot_g=np.weight?Math.round(np.weight*2):Math.round(calories*0.3/4);
  const fat_g=Math.round(calories*0.25/9);
  const carb_g=Math.round((calories-prot_g*4-fat_g*9)/4);
  return{prot:prot_g,fat:fat_g,carb:carb_g};
}

/* ── FOOD SEARCH (Open Food Facts) ── */
async function searchFood(query){
  if(!query.trim())return[];
  try{
    const url=`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=6&fields=product_name,nutriments,serving_size`;
    const r=await fetch(url);const d=await r.json();
    return(d.products||[]).filter(p=>p.product_name&&p.nutriments).map(p=>({
      name:p.product_name,
      kcal:Math.round(p.nutriments["energy-kcal_100g"]||p.nutriments["energy-kcal"]||0),
      prot:Math.round(p.nutriments.proteins_100g||0),
      carb:Math.round(p.nutriments.carbohydrates_100g||0),
      fat:Math.round(p.nutriments.fat_100g||0),
      serving:p.serving_size||"100g",
    }));
  }catch(e){return[];}
}

/* ── TIMER ── */
function fmt(s){return`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;}
function startTimer(secs,label){
  clearInterval(timerInterval);S.timer={active:true,left:secs,label,total:secs};
  timerInterval=setInterval(()=>{
    if(S.timer.left<=1){clearInterval(timerInterval);S.timer={...S.timer,active:false,left:0};if(navigator.vibrate)navigator.vibrate([200,100,200]);}
    else S.timer.left-=1;
    updateTimerUI();
  },1000);updateTimerUI();
}
function stopTimer(){clearInterval(timerInterval);S.timer={active:false,left:0,label:"",total:0};updateTimerUI();}
function togglePause(){
  if(S.timer.active){clearInterval(timerInterval);S.timer.active=false;}
  else{
    S.timer.active=true;
    timerInterval=setInterval(()=>{
      if(S.timer.left<=1){clearInterval(timerInterval);S.timer={...S.timer,active:false,left:0};if(navigator.vibrate)navigator.vibrate([200,100,200]);}
      else S.timer.left-=1;updateTimerUI();
    },1000);
  }
  updateTimerUI();
}
function updateTimerUI(){
  const bar=document.getElementById("timer-bar");if(!bar)return;
  const t=S.timer;
  const st=SESSION_TYPES[detectSession(getDayExs(DAYS[S.day]))];
  if(!t.active&&t.left===0&&t.total===0){bar.style.display="none";return;}
  bar.style.display="block";bar.style.borderTop=`2px solid ${t.left===0?"#30D158":st.color}`;bar.style.background=t.left===0?"#0F300F":"#1C1C1E";
  const te=bar.querySelector(".t-time"),le=bar.querySelector(".t-label"),pb=bar.querySelector(".t-pause"),pr=bar.querySelector(".t-prog");
  if(te){te.textContent=t.left===0?"C'est parti 🚀":fmt(t.left);te.style.color=t.left===0?"#30D158":st.color;}
  if(le)le.textContent="⏱ "+t.label;
  if(pb){pb.textContent=t.active?"⏸":"▶️";pb.style.display=t.left>0?"flex":"none";}
  if(pr&&t.total>0)pr.style.width=`${(t.left/t.total)*100}%`;
}

                    <span style="font-size:11px;color:#8E8E93">Séries</span>
                    <div class="stepper"><button onclick="G.changeSets('${day}',${ei},-1)">−</button><span>${sets}</span><button onclick="G.changeSets('${day}',${ei},1)">+</button></div>
                  </div>
                  ${measure.includes("reps")?`<div style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;color:#8E8E93">Reps</span><div class="stepper"><button onclick="G.changeReps('${day}',${ei},-1)">−</button><span>${reps}</span><button onclick="G.changeReps('${day}',${ei},1)">+</button></div></div>`:""}
                `:`<div style="font-size:12px;color:#8E8E93">${sets} séries${measure.includes("reps")?` × ${reps} reps`:""}</div>`}
              </div>
              ${setRows}
            </div>
          </div>
        </div>`;
      }).join("")}
      ${S.isOwner?`<button onclick="G.openLibrary('${day}')" style="width:100%;padding:13px;border-radius:14px;border:2px dashed #2C2C2E;background:transparent;color:#8E8E93;font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px"><span style="font-size:20px;line-height:1">+</span> Ajouter un exercice</button>`:""}
      ${exs.length===0&&!S.isOwner?`<div style="text-align:center;color:#8E8E93;padding:48px 0;font-size:13px">Aucun exercice pour ce jour 😴</div>`:""}
    </div>
    <div style="height:80px"></div>`;
}

/* ═══════════════════════════════════════════════════════
   STATS TAB

function renderStats(){
  if(!S.currentProfile){
    renderTopBar("Stats","📊");
    document.getElementById("main-content").innerHTML=`<div class="scroll-view" style="display:flex;align-items:center;justify-content:center;padding:60px 20px;text-align:center"><div><div style="font-size:36px;margin-bottom:12px">👆</div><div style="font-size:15px;color:#8E8E93">Sélectionne un profil<br>depuis l'accueil</div></div></div>`;
    return;
  }
  const p=S.currentProfile;const week=S.week;const phase=getPhase(week);
  const day=DAYS[S.day];
  renderTopBar(`${p.emoji} Stats`,"📊 Volume · Sommeil · Progression");

  // Build per-exercise volume for current week+day
  const exs=getDayExs(day);
  const exVolumes=exs.map((ex,ei)=>{
    const lib=LIB.find(e=>e.id===ex.libId)||{name:"Exercice",measure:"weight+reps",muscle:""};
    const mg=MG.find(m=>m.id===lib.muscle);
    const sets=ex.sets||3;
    let vol=0,repsTotal=0,setsLogged=0;
    const setDetails=[];
    for(let si=0;si<sets;si++){
      const w=parseFloat(getLog(lk(week,day,ei,si,"weight")))||0;
      const r=parseFloat(getLog(lk(week,day,ei,si,"reps")))||0;
      const t=getLog(lk(week,day,ei,si,"time"))||"";
      if(w||r||t){setsLogged++;if(w&&r){vol+=w*r;repsTotal+=r;}}
      setDetails.push({w,r,t});
    }
    // Previous week vol
    let prevVol=0;
    for(let si=0;si<sets;si++){
      const pw=parseFloat(getLog(lk(week-1,day,ei,si,"weight")))||0;
      const pr=parseFloat(getLog(lk(week-1,day,ei,si,"reps")))||0;
      prevVol+=pw*pr;
    }
    return{lib,mg,vol:Math.round(vol),prevVol:Math.round(prevVol),setsLogged,sets,setDetails,measure:lib.measure};
  });

  // Sommeil analysis
  const sleepEntries=Object.entries(S.statsData.sleep||{});
  const avgSleep=sleepEntries.length?Math.round(sleepEntries.reduce((a,[,v])=>a+v,0)/sleepEntries.length*10)/10:null;
  const goodSleep=sleepEntries.filter(([,v])=>v>=7);
  const badSleep=sleepEntries.filter(([,v])=>v<7);

  // Week selector for stats
  const weekStats=DAYS.map(d=>({day:d,vol:calcVolume(week,d),exCount:getDayExs(d).length}));
  const maxVol=Math.max(...weekStats.map(w=>w.vol),1);

  document.getElementById("main-content").innerHTML=`
    <div class="scroll-view" style="padding:12px 16px">

      <!-- Week + day picker for stats context -->
      <div style="display:flex;gap:4px;overflow-x:auto;margin-bottom:10px;padding-bottom:2px">
        ${Array.from({length:12},(_,i)=>i+1).map(w=>{const ph=getPhase(w);const a=w===S.week;return`<button class="week-btn" onclick="G.setWeek(${w});renderStats()" style="background:${a?ph.color+"30":"#2C2C2E"};border-color:${a?ph.color:"transparent"};color:${a?ph.color:"#8E8E93"}">${w}</button>`;}).join("")}
      </div>
      <div style="display:flex;gap:5px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px">
        ${DAYS.map((d,i)=>`<button onclick="G.setDay(${i});renderStats()" style="flex-shrink:0;padding:5px 10px;border-radius:16px;border:none;font-size:11px;font-weight:700;background:${i===S.day?"#4ECDC4":"#2C2C2E"};color:${i===S.day?"#111113":"#8E8E93"}">${d}</button>`).join("")}
      </div>

      <!-- Volume par exercice -->
      <div style="font-size:11px;color:#8E8E93;font-weight:700;letter-spacing:0.6px;margin-bottom:8px">VOLUME PAR EXERCICE — S${week} ${day}</div>
      <div class="card" style="margin-bottom:14px">
        ${exVolumes.length===0?`<div style="text-align:center;color:#8E8E93;font-size:13px;padding:12px 0">Aucun exercice ce jour</div>`:""}
        ${exVolumes.map(({lib,mg,vol,prevVol,setsLogged,sets,setDetails,measure})=>{
          const diff=vol-prevVol;
          const hasPrev=week>1&&prevVol>0;
          return`<div class="stat-ex-row">
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${lib.name}</div>
              <div style="display:flex;align-items:center;gap:8px;margin-top:3px;flex-wrap:wrap">
                ${mg?`<span style="font-size:10px;font-weight:700;color:${mg.color}">${mg.label}</span>`:""}
                ${measure==="time"?
                  `<span style="font-size:11px;color:#8E8E93">${setDetails.filter(s=>s.t).map((s,i)=>`S${i+1}: ${s.t}`).join(" · ")||"—"}</span>`
                  :`<span style="font-size:11px;color:#8E8E93">${setsLogged}/${sets} séries logguées</span>`}
              </div>
            </div>
            <div style="text-align:right;flex-shrink:0;margin-left:10px">
              ${measure==="time"?"":
                `<div style="font-size:16px;font-weight:700;color:#4ECDC4">${vol?vol+"kg":"—"}</div>
                ${hasPrev?`<div style="font-size:10px;color:${diff>=0?"#30D158":"#FF3B30"};font-weight:700">${diff>=0?"+":""}${diff}kg vs S${week-1}</div>`:""}`}
            </div>
          </div>`;
        }).join("")}
        ${exVolumes.filter(e=>e.measure!=="time").length>0?`
          <div style="margin-top:12px;padding-top:12px;border-top:1px solid #2C2C2E;display:flex;justify-content:space-between">
            <span style="font-size:12px;color:#8E8E93">Volume total séance</span>
            <span style="font-size:15px;font-weight:700;color:#4ECDC4">${calcVolume(week,day)} kg</span>
          </div>`:""
        }
      </div>

      <!-- Volume hebdo (barchart simplifié) -->
      <div style="font-size:11px;color:#8E8E93;font-weight:700;letter-spacing:0.6px;margin-bottom:8px">VOLUME SEMAINE ${week} PAR JOUR</div>
      <div class="card" style="margin-bottom:14px">
        <div style="display:flex;align-items:flex-end;gap:6px;height:70px;margin-bottom:4px">
          ${weekStats.map(({day:d,vol})=>{
            const h=maxVol>0?Math.max(4,Math.round((vol/maxVol)*60)):4;
            const isActive=d===day;
            return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
              <div style="font-size:9px;color:#8E8E93;font-weight:700">${vol>0?vol:""}</div>
              <div style="width:100%;height:${h}px;background:${isActive?"#4ECDC4":"#2C2C2E"};border-radius:4px 4px 0 0;transition:height 0.3s"></div>
            </div>`;
          }).join("")}
        </div>
        <div style="display:flex;gap:6px">
          ${weekStats.map(({day:d})=>`<div style="flex:1;text-align:center;font-size:9px;color:#8E8E93;font-weight:700">${d}</div>`).join("")}
        </div>
      </div>

      <!-- Sommeil -->
      <div style="font-size:11px;color:#8E8E93;font-weight:700;letter-spacing:0.6px;margin-bottom:8px">SOMMEIL</div>
      <div class="card" style="margin-bottom:14px">
        ${S.isOwner?`
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
            <div style="font-size:13px;color:#8E8E93;flex-shrink:0">Ce soir (S${week} ${day})</div>
            <div style="display:flex;align-items:center;gap:6px;margin-left:auto">
              <input type="number" inputmode="decimal" step="0.5" min="0" max="24"
                placeholder="7.5"
                value="${S.statsData.sleep[`w${week}_${day}`]||""}"
                onchange="G.setSleep('w${week}_${day}',parseFloat(this.value))"
                style="width:60px;background:#111113;border:1px solid #2C2C2E;border-radius:8px;color:#F2F2F7;font-size:14px;font-weight:700;text-align:center;padding:6px;outline:none"/>
              <span style="font-size:12px;color:#8E8E93">heures</span>
            </div>
          </div>`:""}
        ${avgSleep!==null?`
          <div style="display:flex;gap:10px;margin-bottom:10px">
            <div style="flex:1;background:${avgSleep>=7?"#30D15820":"#FF3B3020"};border-radius:10px;padding:10px;text-align:center">
              <div style="font-size:20px;font-weight:700;color:${avgSleep>=7?"#30D158":"#FF3B30"}">${avgSleep}h</div>
              <div style="font-size:10px;color:#8E8E93">Moy. sommeil</div>
            </div>
            <div style="flex:1;background:#4ECDC420;border-radius:10px;padding:10px;text-align:center">
              <div style="font-size:20px;font-weight:700;color:#4ECDC4">${sleepEntries.length}</div>
              <div style="font-size:10px;color:#8E8E93">Nuits enregistrées</div>
            </div>
          </div>
          <!-- Corrélation performance / sommeil -->
          ${buildSleepCorrelation()}`
        :`<div style="font-size:13px;color:#8E8E93;text-align:center;padding:10px 0">Commence à enregistrer ton sommeil<br>pour voir l'analyse 🌙</div>`}
      </div>

      <!-- Progression 12 semaines -->
      <div style="font-size:11px;color:#8E8E93;font-weight:700;letter-spacing:0.6px;margin-bottom:8px">PROGRESSION 12 SEMAINES</div>
      <div class="card" style="margin-bottom:20px">
        ${PHASES.map(ph=>{
          const tot=ph.weeks.reduce((a,w)=>a+DAYS.reduce((b,d)=>b+getDayExs(d).length,0),0);
          const dn=ph.weeks.reduce((a,w)=>a+DAYS.reduce((b,d)=>b+getDayExs(d).filter((_,i)=>getLog(lk(w,d,i,0,"done"))).length,0),0);
          const pct=tot>0?Math.round((dn/tot)*100):0;
          return`<div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
              <span style="font-size:12px;color:#8E8E93">${ph.name} — ${ph.label}</span>
              <span style="font-size:12px;color:${ph.color};font-weight:700">${pct}%</span>
            </div>
            <div style="height:5px;background:#1C1C1E;border-radius:3px;overflow:hidden">
              <div style="height:100%;width:${pct}%;background:${ph.color};border-radius:3px"></div>
            </div>
          </div>`;
        }).join("")}
      </div>
    </div>`;
}

function buildSleepCorrelation(){
  // For each exercise, compare avg weight on good sleep nights vs bad
  const allExIds=[...new Set(DAYS.flatMap(d=>getDayExs(d).map(e=>e.libId)))];
  if(!allExIds.length)return`<div style="font-size:12px;color:#8E8E93;text-align:center;padding:8px 0">Ajoute des exercices pour voir la corrélation</div>`;

  const results=[];
  allExIds.slice(0,5).forEach(libId=>{
    const lib=LIB.find(e=>e.id===libId);if(!lib)return;
    const goodWeights=[],badWeights=[];
    DAYS.forEach(d=>{
      const exs=getDayExs(d);
      const ei=exs.findIndex(e=>e.libId===libId);if(ei<0)return;
      for(let w=1;w<=12;w++){
        const sleepKey=`w${w}_${d}`;
        const sleepH=S.statsData.sleep[sleepKey];if(!sleepH)continue;
        const ws=[];
        for(let si=0;si<(exs[ei].sets||3);si++){
          const wv=parseFloat(getLog(lk(w,d,ei,si,"weight")));
          if(wv)ws.push(wv);
        }
        if(!ws.length)continue;
        const avg=ws.reduce((a,b)=>a+b,0)/ws.length;
        if(sleepH>=7)goodWeights.push(avg);else badWeights.push(avg);
      }
    });
    if(!goodWeights.length&&!badWeights.length)return;
    const avgGood=goodWeights.length?Math.round(goodWeights.reduce((a,b)=>a+b,0)/goodWeights.length*10)/10:null;
    const avgBad=badWeights.length?Math.round(badWeights.reduce((a,b)=>a+b,0)/badWeights.length*10)/10:null;
    if(avgGood&&avgBad){
      const diff=Math.round(((avgGood-avgBad)/avgBad)*100);
      results.push({name:lib.name,avgGood,avgBad,diff});
    }
  });

  if(!results.length)return`<div style="font-size:12px;color:#8E8E93;text-align:center;padding:8px 0">Pas encore assez de données pour la corrélation 🔬</div>`;

  return`<div style="margin-top:4px">
    <div style="font-size:11px;color:#8E8E93;font-weight:700;margin-bottom:8px">⚡ PERFORMANCE vs SOMMEIL</div>
    ${results.map(r=>`<div style="margin-bottom:8px">
      <div style="font-size:12px;font-weight:600;color:#F2F2F7;margin-bottom:3px">${r.name}</div>
      <div style="display:flex;gap:8px;align-items:center">
        <div style="font-size:11px;color:#30D158">🌙 ≥7h: <strong>${r.avgGood}kg</strong></div>
        <div style="font-size:11px;color:#FF6B35">😴 &lt;7h: <strong>${r.avgBad}kg</strong></div>
        <div style="margin-left:auto;font-size:11px;font-weight:700;color:${r.diff>=0?"#30D158":"#FF3B30"}">${r.diff>=0?"+":""}${r.diff}%</div>
      </div>
    </div>`).join("")}
  </div>`;
}

/* ═══════════════════════════════════════════════════════
   LIBRARY MODAL
═══════════════════════════════════════════════════════ */
function buildLibList(day){
  const filter=S.libFilter;
  const list=filter?LIB.filter(e=>e.muscle===filter):LIB;
  if(!list.length)return`<div style="text-align:center;color:#8E8E93;padding:20px 0">Aucun exercice</div>`;
  return list.map(ex=>{
    const mg=MG.find(m=>m.id===ex.muscle);
    const mLabel={
      "weight+reps":"🏋️ Poids + Reps","reps":"🔢 Reps","time":"⏱ Temps","weight+time":"🏋️ Poids + Temps"
    }[ex.measure]||"";
    return`<div class="lib-row" onclick="G.addExercise('${day}','${ex.id}')">
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:600;color:#F2F2F7;line-height:1.3">${ex.name}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:3px">
          ${mg?`<span style="font-size:10px;font-weight:700;color:${mg.color}">${mg.label}</span>`:""}
          <span style="font-size:10px;color:#8E8E93">${mLabel}</span>
          ${ex.tip?`<span style="font-size:10px;color:#8E8E93;font-style:italic">· ${ex.tip}</span>`:""}
        </div>
      </div>
      <div style="font-size:22px;color:#4ECDC4;font-weight:700;margin-left:10px;flex-shrink:0">+</div>
    </div>`;
  }).join("");
}

function renderLibModal(day){
  const mc=document.getElementById("modal-container");if(!mc)return;
  mc.innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal-box">
        <div class="modal-header">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <div style="font-size:17px;font-weight:700">Ajouter un exercice</div>
            <button onclick="closeModal()" style="background:#2C2C2E;border:none;border-radius:10px;padding:7px 14px;color:#F2F2F7;font-size:13px;font-weight:600">✕ Fermer</button>
          </div>
          <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:2px">
            <button class="mg-btn" onclick="G.setLibFilter(null)" style="background:${!S.libFilter?"#4ECDC4":"#2C2C2E"};color:${!S.libFilter?"#111113":"#8E8E93"}">Tous</button>
            ${MG.map(mg=>`<button class="mg-btn" onclick="G.setLibFilter('${mg.id}')" style="background:${S.libFilter===mg.id?mg.color:"#2C2C2E"};color:${S.libFilter===mg.id?"#111113":"#8E8E93"}">${mg.label}</button>`).join("")}
          </div>
        </div>
        <div class="modal-body" id="lib-list">${buildLibList(day)}</div>
      </div>
    </div>`;
}

function closeModal(){const m=document.getElementById("modal-container");if(m)m.innerHTML="";}

/* ═══════════════════════════════════════════════════════
   ADD FOOD MODAL (quantity picker)
═══════════════════════════════════════════════════════ */
function showAddFoodModal(foodIdx){
  const f=S.foodResults[foodIdx];if(!f)return;
  const mc=document.getElementById("modal-container");if(!mc)return;
  mc.innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal-box" style="padding:24px 20px 32px" onclick="event.stopPropagation()">
        <div style="font-size:16px;font-weight:700;margin-bottom:4px">${f.name}</div>
        <div style="font-size:12px;color:#8E8E93;margin-bottom:16px">${f.kcal}kcal · P:${f.prot}g · G:${f.carb}g · L:${f.fat}g <span>/ 100g</span></div>
        <div style="font-size:12px;color:#8E8E93;margin-bottom:6px;font-weight:600">QUANTITÉ</div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
          <input type="number" id="food-grams" value="100" min="1" max="2000" class="modal-input" style="margin:0;width:100px;text-align:center"/>
          <span style="font-size:14px;color:#8E8E93">grammes</span>
          <div style="margin-left:auto;text-align:right">
            <div id="food-preview-kcal" style="font-size:20px;font-weight:700;color:#F59E0B">100kcal</div>
            <div style="font-size:11px;color:#8E8E93">estimé</div>
          </div>
        </div>
        <script>
          document.getElementById('food-grams').oninput=function(){
            const g=parseFloat(this.value)||0;
            document.getElementById('food-preview-kcal').textContent=Math.round(${f.kcal}*g/100)+'kcal';
          };
        <\/script>
        <button class="btn-primary" style="background:#4ECDC4;color:#111113" onclick="G.confirmAddFood(${foodIdx})">Ajouter</button>
        <button class="btn-secondary" onclick="closeModal()">Annuler</button>
      </div>
    </div>`;
}

/* ═══════════════════════════════════════════════════════
   GLOBAL HANDLERS
═══════════════════════════════════════════════════════ */
window.G={
  startTimer,stopTimer,togglePause,
  setTab(id){S.tab=id;renderTab();},

  setWeek(w){S.week=w;if(S.tab==="workout")renderWorkoutContent();else if(S.tab==="stats")renderStats();else renderWorkout();},
  setDay(d){
    S.day=d;
    if(S.tab==="workout"){
      const sc=document.getElementById("scroll-content");const sy=sc?sc.scrollTop:0;
      renderWorkoutContent();if(sc)requestAnimationFrame(()=>{sc.scrollTop=sy;});
    }
  },

  toggleDone(day,ei){
    if(!S.isOwner)return;
    const sc=document.getElementById("scroll-content");const sy=sc?sc.scrollTop:0;
    const k=lk(S.week,day,ei,0,"done");setLog(k,getLog(k)?"":"1");
    renderWorkoutContent();if(sc)requestAnimationFrame(()=>{sc.scrollTop=sy;});
  },
  logInput(week,day,ei,si,field,val){if(!S.isOwner)return;setLog(lk(week,day,ei,si,field),val);},
  changeSets(day,ei,delta){
    if(!S.isOwner)return;
    const sc=document.getElementById("scroll-content");const sy=sc?sc.scrollTop:0;
    const exs=[...getDayExs(day)];exs[ei].sets=Math.max(1,Math.min(8,(exs[ei].sets||3)+delta));
    setDayExs(day,exs);renderWorkoutContent();if(sc)requestAnimationFrame(()=>{sc.scrollTop=sy;});
  },
  changeReps(day,ei,delta){
    if(!S.isOwner)return;
    const sc=document.getElementById("scroll-content");const sy=sc?sc.scrollTop:0;
    const exs=[...getDayExs(day)];exs[ei].reps=Math.max(1,Math.min(50,(exs[ei].reps||10)+delta));
    setDayExs(day,exs);renderWorkoutContent();if(sc)requestAnimationFrame(()=>{sc.scrollTop=sy;});
  },
  removeExercise(day,ei){
    if(!S.isOwner)return;
    const sc=document.getElementById("scroll-content");const sy=sc?sc.scrollTop:0;
    const exs=[...getDayExs(day)];exs.splice(ei,1);setDayExs(day,exs);renderWorkoutContent();
    if(sc)requestAnimationFrame(()=>{sc.scrollTop=sy;});
  },
  openLibrary(day){if(!S.isOwner)return;S.libFilter=null;S._libDay=day;renderLibModal(day);},
  setLibFilter(muscle){S.libFilter=muscle;const el=document.getElementById("lib-list");if(el)el.innerHTML=buildLibList(S._libDay);},
  addExercise(day,libId){
    const exs=[...getDayExs(day)];exs.push({libId,sets:3,reps:10});setDayExs(day,exs);closeModal();
    const sc=document.getElementById("scroll-content");const sy=sc?sc.scrollTop:0;
    renderWorkoutContent();if(sc)requestAnimationFrame(()=>{sc.scrollTop=sy;});
  },

  // Nutrition
  setGoal(g){if(!S.isOwner)return;S.nutritionData.profile.goal=g;scheduleNutSave();renderNutrition();},
  setNutProfile(key,val){
    if(!S.isOwner)return;
    S.nutritionData.profile[key]=isNaN(val)?val:parseFloat(val)||val;
    scheduleNutSave();
    // Re-render TDEE only
    const tdeeData=calcTDEE(S.nutritionData.profile);
    if(tdeeData){renderNutrition();}
  },
  async foodSearchChange(val){
    S.foodSearch=val;
    if(!val.trim()){S.foodResults=[];S.foodLoading=false;updateFoodList();return;}
    S.foodLoading=true;updateFoodList();
    S.foodResults=await searchFood(val);
    S.foodLoading=false;updateFoodList();
  },
  addFood(idx){showAddFoodModal(idx);},
  confirmAddFood(idx){
    const f=S.foodResults[idx];if(!f)return;
    const g=parseFloat(document.getElementById("food-grams")?.value)||100;
    const today=todayKey();
    if(!S.nutritionData.foodLog[today])S.nutritionData.foodLog[today]=[];
    S.nutritionData.foodLog[today].push({...f,grams:g});
    scheduleNutSave();closeModal();S.foodSearch="";S.foodResults=[];renderNutrition();
  },
  removeFood(idx){
    if(!S.isOwner)return;
    const today=todayKey();
    S.nutritionData.foodLog[today].splice(idx,1);
    scheduleNutSave();renderNutrition();
  },

  // Stats / Sleep
  setSleep(key,val){
    if(!S.isOwner||isNaN(val))return;
    S.statsData.sleep[key]=val;scheduleStatsSave();renderStats();
  },

  // Delete profile
  showDeleteConfirm(){
    const app=document.getElementById("app");
    if(document.getElementById("del-ov"))return;
    const ov=document.createElement("div");ov.id="del-ov";ov.className="modal-overlay";
    ov.innerHTML=`<div class="modal-box" style="padding:24px 20px 32px" onclick="event.stopPropagation()">
      <div style="text-align:center;margin-bottom:16px">
        <div style="font-size:40px;margin-bottom:12px">🗑️</div>
        <div style="font-size:18px;font-weight:700;margin-bottom:8px">Supprimer mon profil ?</div>
        <div style="font-size:13px;color:#8E8E93;line-height:1.5">Toutes les données seront <strong style="color:#FF3B30">définitivement supprimées</strong>.</div>
      </div>
      <button class="btn-primary" id="del-btn" style="background:#FF3B30" onclick="G.confirmDelete()">Oui, supprimer définitivement</button>
      <button class="btn-secondary" onclick="document.getElementById('del-ov').remove()">Annuler</button>
    </div>`;
    app.appendChild(ov);
  },
  async confirmDelete(){
    const btn=document.getElementById("del-btn");if(btn){btn.textContent="Suppression...";btn.disabled=true;}
    try{
      await deleteProfile(S.currentProfile.id);
      S.profiles=S.profiles.filter(p=>p.id!==S.currentProfile.id);
      S.currentProfile=null;S.isOwner=false;
      S.workoutData={days:{},logs:{}};S.nutritionData={profile:{},foodLog:{}};S.statsData={sleep:{}};
      S.tab="home";renderApp();renderHome();
    }catch(e){if(btn){btn.textContent="Erreur";btn.disabled=false;}}
  },
};

function updateFoodList(){
  const el=document.getElementById("food-results-list");if(!el)return;
  if(S.foodLoading){el.innerHTML=`<div style="text-align:center;padding:20px"><div class="spinner"></div></div>`;return;}
  if(!S.foodResults.length){el.innerHTML="";return;}
  el.innerHTML=S.foodResults.map((f,i)=>`
    <div class="food-row">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${f.name}</div>
        <div style="font-size:11px;color:#8E8E93;margin-top:2px">${f.kcal}kcal · P:${f.prot}g · G:${f.carb}g · L:${f.fat}g / 100g</div>
      </div>
      <button onclick="G.addFood(${i})" style="background:#4ECDC420;border:1px solid #4ECDC4;border-radius:8px;padding:6px 10px;color:#4ECDC4;font-size:12px;font-weight:700;flex-shrink:0;margin-left:8px">+ Ajouter</button>
    </div>`).join("");
}

window.renderHome=renderHome;
window.renderStats=renderStats;
window.closeModal=closeModal;

/* ── INIT ── */
async function init(){
  try{S.profiles=await loadProfiles();}catch(e){S.profiles=[];}
  renderApp();renderHome();
}
init();

  const sw=`self.addEventListener('install',()=>self.skipWaiting());self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>new Response('',{status:503}))))`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:"application/javascript"}))).catch(()=>{});
}

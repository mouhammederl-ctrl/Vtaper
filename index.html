.progress-bar{height:100%;border-radius:3px;transition:width 0.4s}

.ex-card{border-radius:14px;padding:12px 12px 10px;margin-bottom:8px;border:1px solid #2C2C2E;transition:border-color 0.3s,background 0.3s}
.ex-card.done{background:#0A1A0A;border-color:#1E4A1E}
.ex-card:not(.done){background:#1C1C1E}

/* Per-set row */
.set-row{display:flex;align-items:center;gap:5px;margin-top:5px;flex-wrap:nowrap}
.set-num{font-size:10px;font-weight:700;color:#8E8E93;width:20px;text-align:center;flex-shrink:0}

.inp-label{font-size:10px;color:#3C3C3E;flex-shrink:0}

// Session type auto-detected from muscles used

  PUSH:  {label:"PUSH",   sub:"Pectoraux · Épaules · Triceps", color:"#FF6B35",emoji:"💪"},
  PULL:  {label:"PULL",   sub:"Dos · Biceps · Arrière Épaule", color:"#4ECDC4",emoji:"🏋️"},
  LEGS:  {label:"LEGS",   sub:"Quadriceps · Ischios · Mollets",color:"#A855F7",emoji:"🦵"},
  CORE:  {label:"CORE",   sub:"Abdominaux · Gainage",          color:"#F59E0B",emoji:"⚡"},
  CARDIO:{label:"CARDIO", sub:"Cardio & Endurance",            color:"#EF4444",emoji:"🏃"},
  REST:  {label:"REPOS",  sub:"Jour de récupération",          color:"#3C3C3E",emoji:"😴"},
  CUSTOM:{label:"SÉANCE", sub:"Programme personnalisé",        color:"#8E8E93",emoji:"🎯"},
};

// Big muscles = longer rest
const BIG_MUSCLES=new Set(["haut_pec","bas_pec","dos_large","dos_epais","quadri","ischios"]);

function detectSession(exs){
  if(!exs||exs.length===0) return "REST";
  const counts={};
  exs.forEach(ex=>{
    const lib=LIBRARY.find(e=>e.id===ex.libId); if(!lib) return;
    const mg=MUSCLE_GROUPS.find(m=>m.id===lib.muscle); if(!mg) return;
    counts[mg.session]=(counts[mg.session]||0)+1;
  });
  if(!Object.keys(counts).length) return "CUSTOM";
  return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
}

  {weeks:[5,6,7,8],   name:"PHASE 2",label:"Surcharge progressive", color:"#FF6B35"},
  {weeks:[9,10,11,12],name:"PHASE 3",label:"Intensification",       color:"#A855F7"},
];
const getPhase=w=>PHASES.find(p=>p.weeks.includes(w))||PHASES[0];
const EMOJIS=["💪","🔥","⚡","🏋️","🦵","🎯","👊","🚀","💥","🏆","⚙️","🌟"];

  workoutData:{days:{},logs:{}},
  timer:{active:false,left:0,label:"",total:0},
  libFilter:null, _libDay:null,
};
let timerInterval=null, pendingSave=null;

// ── AUTH ──────────────────────────────────────────────────────────────────────
function getSecret(){let k=localStorage.getItem("vtaper_secret");if(!k){k=crypto.randomUUID();localStorage.setItem("vtaper_secret",k);}return k;}
function getMyProfileId(){return localStorage.getItem("vtaper_profile_id");}
function setMyProfileId(id){localStorage.setItem("vtaper_profile_id",id);}

// ── FIRESTORE ─────────────────────────────────────────────────────────────────
async function loadProfiles(){const s=await getDocs(collection(db,"profiles"));return s.docs.map(d=>({id:d.id,...d.data()}));}
async function loadWD(pid){const s=await getDoc(doc(db,"workoutData",pid));return s.exists()?s.data():{days:{},logs:{}};}
async function saveWD(pid,data){await setDoc(doc(db,"workoutData",pid),{...data,updatedAt:serverTimestamp()},{merge:false});}
async function createProfile(name,emoji){const secret=getSecret();const id=name.toLowerCase().replace(/\s+/g,"_")+"_"+Date.now();const p={name,emoji,secretKey:secret,createdAt:serverTimestamp()};await setDoc(doc(db,"profiles",id),p);setMyProfileId(id);return{id,...p};}
async function deleteProfile(pid){await deleteDoc(doc(db,"profiles",pid));await deleteDoc(doc(db,"workoutData",pid));localStorage.removeItem("vtaper_profile_id");}

function scheduleSave(){
  if(!S.isOwner||!S.currentProfile)return;
  clearTimeout(pendingSave);
  pendingSave=setTimeout(async()=>{try{await saveWD(S.currentProfile.id,S.workoutData);}catch(e){}},1000);
}

// ── DATA HELPERS ──────────────────────────────────────────────────────────────
function getDayExs(day){return(S.workoutData.days[day]||{exercises:[]}).exercises;}
function setDayExs(day,exs){if(!S.workoutData.days[day])S.workoutData.days[day]={};S.workoutData.days[day].exercises=exs;scheduleSave();}
function getLog(k){return S.workoutData.logs[k]||"";}
function setLog(k,v){S.workoutData.logs[k]=v;scheduleSave();}
function lk(week,day,ei,si,field){return `w${week}_${day}_${ei}_s${si}_${field}`;}

// ── TIMER ─────────────────────────────────────────────────────────────────────
function fmt(s){return `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;}
function startTimer(secs,label){
  clearInterval(timerInterval);
  S.timer={active:true,left:secs,label,total:secs};
  timerInterval=setInterval(()=>{
    if(S.timer.left<=1){clearInterval(timerInterval);S.timer={...S.timer,active:false,left:0};if(navigator.vibrate)navigator.vibrate([200,100,200]);}
    else S.timer.left-=1;
    updateTimerUI();
  },1000);
  updateTimerUI();
}
function stopTimer(){clearInterval(timerInterval);S.timer={active:false,left:0,label:"",total:0};updateTimerUI();}
function togglePause(){
  if(S.timer.active){clearInterval(timerInterval);S.timer.active=false;}
  else{
    S.timer.active=true;
    timerInterval=setInterval(()=>{
      if(S.timer.left<=1){clearInterval(timerInterval);S.timer={...S.timer,active:false,left:0};if(navigator.vibrate)navigator.vibrate([200,100,200]);}
      else S.timer.left-=1;
      updateTimerUI();
    },1000);
  }
  updateTimerUI();
}
function updateTimerUI(){
  const bar=document.getElementById("timer-bar");if(!bar)return;
  const t=S.timer;
  const st=SESSION_TYPES[detectSession(getDayExs(DAYS[S.day]))];
  if(!t.active&&t.left===0&&t.total===0){bar.style.display="none";return;}
  bar.style.display="block";
  bar.style.borderTop=`2px solid ${t.left===0?"#30D158":st.color}`;
  bar.style.background=t.left===0?"#0F300F":"#1C1C1E";
  const te=bar.querySelector(".t-time"),le=bar.querySelector(".t-label"),pb=bar.querySelector(".t-pause"),pr=bar.querySelector(".t-prog");
  if(te){te.textContent=t.left===0?"C'est parti 🚀":fmt(t.left);te.style.color=t.left===0?"#30D158":st.color;}
  if(le)le.textContent="⏱ "+t.label;
  if(pb){pb.textContent=t.active?"⏸":"▶️";pb.style.display=t.left>0?"flex":"none";}
  if(pr&&t.total>0)pr.style.width=`${(t.left/t.total)*100}%`;
}

window.G={
  startTimer,stopTimer,togglePause,
  goHome(){S.screen="home";S.currentProfile=null;S.isOwner=false;S.workoutData={days:{},logs:{}};renderHome();},
  setWeek(w){S.week=w;renderWorkoutScreen();},
  setDay(d){S.day=d;renderContent();},
  goOverview(){renderOverview();},
  goWorkout(){renderWorkoutScreen();},
  weekFromOverview(w){S.week=w;renderWorkoutScreen();},

  // Toggle done WITHOUT scroll jump
  toggleDone(day,ei){
    if(!S.isOwner)return;
    const sc=document.getElementById("scroll-content");
    const sy=sc?sc.scrollTop:0;
    const k=lk(S.week,day,ei,0,"done");
    setLog(k,getLog(k)?"":"1");
    renderContent();
    if(sc)requestAnimationFrame(()=>{sc.scrollTop=sy;});
  },

  logInput(week,day,ei,si,field,val){if(!S.isOwner)return;setLog(lk(week,day,ei,si,field),val);},

  changeSets(day,ei,delta){
    if(!S.isOwner)return;
    const sc=document.getElementById("scroll-content");const sy=sc?sc.scrollTop:0;
    const exs=[...getDayExs(day)];
    exs[ei].sets=Math.max(1,Math.min(8,(exs[ei].sets||3)+delta));
    setDayExs(day,exs);renderContent();
    if(sc)requestAnimationFrame(()=>{sc.scrollTop=sy;});
  },
  changeReps(day,ei,delta){
    if(!S.isOwner)return;
    const sc=document.getElementById("scroll-content");const sy=sc?sc.scrollTop:0;
    const exs=[...getDayExs(day)];
    exs[ei].reps=Math.max(1,Math.min(50,(exs[ei].reps||10)+delta));
    setDayExs(day,exs);renderContent();
    if(sc)requestAnimationFrame(()=>{sc.scrollTop=sy;});
  },

  removeExercise(day,ei){
    if(!S.isOwner)return;
    const sc=document.getElementById("scroll-content");const sy=sc?sc.scrollTop:0;
    const exs=[...getDayExs(day)];exs.splice(ei,1);setDayExs(day,exs);renderContent();
    if(sc)requestAnimationFrame(()=>{sc.scrollTop=sy;});
  },

  openLibrary(day){
    if(!S.isOwner)return;
    S.libFilter=null;S._libDay=day;
    renderLibModal(day);
  },
  setLibFilter(muscle){
    S.libFilter=muscle;
    const el=document.getElementById("lib-list");
    if(el)el.innerHTML=buildLibList(S._libDay);
  },
  addExercise(day,libId){
    const exs=[...getDayExs(day)];
    exs.push({libId,sets:3,reps:10});
    setDayExs(day,exs);
    closeModal();
    renderContent();
  },

  showDeleteConfirm(){
    const app=document.getElementById("app");
    if(document.getElementById("del-ov"))return;
    const ov=document.createElement("div");ov.id="del-ov";ov.className="modal-overlay";
    ov.innerHTML=`<div class="modal-box" style="padding:24px 20px 32px" onclick="event.stopPropagation()">
      <div style="text-align:center;margin-bottom:16px"><div style="font-size:40px;margin-bottom:12px">🗑️</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:8px">Supprimer mon profil ?</div>
      <div style="font-size:13px;color:#8E8E93;line-height:1.5">Toutes tes données seront <strong style="color:#FF3B30">définitivement supprimées</strong>.</div></div>
      <button class="btn-primary" id="del-btn" style="background:#FF3B30" onclick="G.confirmDelete()">Oui, supprimer</button>
      <button class="btn-secondary" onclick="document.getElementById('del-ov').remove()">Annuler</button>
    </div>`;
    app.appendChild(ov);
  },
  async confirmDelete(){
    const btn=document.getElementById("del-btn");if(btn){btn.textContent="Suppression...";btn.disabled=true;}
    try{
      await deleteProfile(S.currentProfile.id);
      S.profiles=S.profiles.filter(p=>p.id!==S.currentProfile.id);
      S.currentProfile=null;S.isOwner=false;S.workoutData={days:{},logs:{}};S.screen="home";
      renderHome();
    }catch(e){if(btn){btn.textContent="Erreur, réessaie";btn.disabled=false;}}
  },
};

// ── CONTENT (day tabs + exercises) — called without scroll reset ───────────────
function renderContent(){
  const week=S.week;const day=DAYS[S.day];
  const exs=getDayExs(day);
  const sessionType=detectSession(exs);
  const st=SESSION_TYPES[sessionType];
  const phase=getPhase(week);

  // — Day tabs (always rendered fresh) —
  const tabs=document.getElementById("day-tabs");
  if(tabs){
    tabs.innerHTML=DAYS.map((d,i)=>{
      const dExs=getDayExs(d);
      const dst=SESSION_TYPES[detectSession(dExs)];
      const done=dExs.filter((_,j)=>getLog(lk(week,d,j,0,"done"))).length;
      const full=dExs.length>0&&done===dExs.length;
      const active=i===S.day;
      return `<button class="day-tab" onclick="G.setDay(${i})" style="background:${active?dst.color:'#2C2C2E'};color:${active?'#fff':full?'#30D158':'#8E8E93'}">
        <span style="font-size:13px">${dst.emoji}</span>
        <span style="font-size:10px;font-weight:700">${d}</span>
        ${full?'<span style="font-size:8px">✅</span>':''}
      </button>`;
    }).join("");
  }

  const done=exs.filter((_,i)=>getLog(lk(week,day,i,0,"done"))).length;
  const pct=exs.length>0?Math.round((done/exs.length)*100):0;

  const sc=document.getElementById("scroll-content");if(!sc)return;

  sc.innerHTML=`
    <!-- Session header -->
    <div style="padding:12px 16px 6px;display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:24px">${st.emoji}</span>
        <div>
          <div style="font-size:17px;font-weight:700;color:${st.color}">${st.label}</div>
          <div style="font-size:11px;color:#8E8E93">${st.sub}</div>
        </div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:#8E8E93">${done}/${exs.length}</div>
        <div style="width:60px;height:4px;background:#2C2C2E;border-radius:2px;overflow:hidden;margin-top:3px"><div style="height:100%;width:${pct}%;background:${st.color};border-radius:2px;transition:width 0.3s"></div></div>
      </div>
    </div>

    <!-- Exercise cards -->
    <div style="padding:0 12px">
      ${exs.map((ex,ei)=>{
        const lib=LIBRARY.find(e=>e.id===ex.libId)||{name:"Exercice inconnu",measure:"weight+reps",tip:"",muscle:""};
        const mg=MUSCLE_GROUPS.find(m=>m.id===lib.muscle);
        const isDone=!!getLog(lk(week,day,ei,0,"done"));
        const sets=ex.sets||3;const reps=ex.reps||10;
        const measure=lib.measure||"weight+reps";
        const restSecs=mg&&BIG_MUSCLES.has(mg.id)?90:60;

        // Build per-set rows
        const setRows=Array.from({length:sets},(_,si)=>{
          const wVal=getLog(lk(week,day,ei,si,"weight"));
          const tVal=getLog(lk(week,day,ei,si,"time"));
          const rVal=getLog(lk(week,day,ei,si,"reps"));
          const prevW=week>1?getLog(lk(week-1,day,ei,si,"weight")):"";
          const prevT=week>1?getLog(lk(week-1,day,ei,si,"time")):"";

          let cells="";
          // Weight input
          if(measure==="weight+reps"||measure==="weight+time"){
            cells+=`<input class="inp w-kg" type="number" inputmode="decimal" placeholder="${prevW||'kg'}" value="${wVal}"
              ${S.isOwner?`onchange="G.logInput(${week},'${day}',${ei},${si},'weight',this.value)"`:'readonly'}
              style="color:${wVal?st.color:'#8E8E93'}"/>`;
          }
          // Separator
          if(measure==="weight+reps") cells+=`<span class="inp-label">×</span>`;
          if(measure==="weight+time") cells+=`<span class="inp-label">+</span>`;
          // Reps input
          if(measure==="weight+reps"||measure==="reps"){
            cells+=`<input class="inp w-reps" type="number" inputmode="numeric" placeholder="${reps}" value="${rVal}"
              ${S.isOwner?`onchange="G.logInput(${week},'${day}',${ei},${si},'reps',this.value)"`:'readonly'}
              style="color:${rVal?st.color:'#8E8E93'}"/>`;
          }
          // Time input
          if(measure==="time"||measure==="weight+time"){
            cells+=`<input class="inp w-time" placeholder="${prevT||'00:00'}" value="${tVal}"
              ${S.isOwner?`oninput="G.logInput(${week},'${day}',${ei},${si},'time',this.value)"`:'readonly'}
              style="color:${tVal?st.color:'#8E8E93'}"/>`;
          }

          // Timer button per set
          const timerBtn=S.isOwner?`<button onclick="G.startTimer(${restSecs},'${lib.name.replace(/'/g,"")} S${si+1}')"
            style="background:#2C2C2E;border:none;border-radius:7px;padding:5px 7px;color:#8E8E93;font-size:10px;white-space:nowrap;flex-shrink:0;margin-left:auto">⏱${restSecs===90?"1:30":"1:00"}</button>`:"";

          return `<div class="set-row">
            <span class="set-num">S${si+1}</span>
            ${cells}
            ${timerBtn}
          </div>`;
        }).join("");

        return `<div class="ex-card ${isDone?'done':''}">
          <div style="display:flex;align-items:flex-start;gap:10px">
            <!-- Checkbox -->
            ${S.isOwner
              ?`<button onclick="G.toggleDone('${day}',${ei})" style="width:24px;height:24px;border-radius:12px;flex-shrink:0;margin-top:2px;border:2px solid ${isDone?'#30D158':st.color};background:${isDone?'#30D158':'transparent'};display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff">${isDone?'✓':''}</button>`
              :`<div style="width:24px;height:24px;border-radius:12px;flex-shrink:0;margin-top:2px;border:2px solid ${isDone?'#30D158':'#3C3C3E'};background:${isDone?'#30D158':'transparent'};display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff">${isDone?'✓':''}</div>`}
            <div style="flex:1;min-width:0">
              <!-- Name + muscle + remove -->
              <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px">
                <div>
                  <div style="font-size:14px;font-weight:700;color:${isDone?'#8E8E93':'#F2F2F7'};text-decoration:${isDone?'line-through':'none'};line-height:1.3">${lib.name}</div>
                  ${mg?`<span style="font-size:10px;font-weight:700;color:${mg.color}">${mg.label}</span>`:''}
                  ${lib.tip?`<span style="font-size:10px;color:#8E8E93;margin-left:4px;font-style:italic">· ${lib.tip}</span>`:''}
                </div>
                ${S.isOwner?`<button onclick="G.removeExercise('${day}',${ei})" style="background:#2C2C2E;border:none;border-radius:7px;padding:3px 8px;color:#8E8E93;font-size:11px;flex-shrink:0">✕</button>`:''}
              </div>

              <!-- Sets / Reps steppers -->
              <div style="display:flex;align-items:center;gap:8px;margin:8px 0 2px">
                ${S.isOwner?`
                  <div style="display:flex;align-items:center;gap:6px">
                    <span style="font-size:11px;color:#8E8E93">Séries</span>
                    <div class="stepper">
                      <button onclick="G.changeSets('${day}',${ei},-1)">−</button>
                      <span>${sets}</span>
                      <button onclick="G.changeSets('${day}',${ei},1)">+</button>
                    </div>
                  </div>
                  ${measure.includes("reps")?`
                  <div style="display:flex;align-items:center;gap:6px">
                    <span style="font-size:11px;color:#8E8E93">Reps</span>
                    <div class="stepper">
                      <button onclick="G.changeReps('${day}',${ei},-1)">−</button>
                      <span>${reps}</span>
                      <button onclick="G.changeReps('${day}',${ei},1)">+</button>
                    </div>
                  </div>`:''}
                `:`<div style="font-size:12px;color:#8E8E93">${sets} séries${measure.includes("reps")?` × ${reps} reps`:''}</div>`}
              </div>

              <!-- Per-set input rows -->
              ${setRows}
            </div>
          </div>
        </div>`;
      }).join("")}

      <!-- Add exercise button -->
      ${S.isOwner?`
        <button onclick="G.openLibrary('${day}')" style="width:100%;padding:13px;border-radius:14px;border:2px dashed #2C2C2E;background:transparent;color:#8E8E93;font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px">
          <span style="font-size:20px;line-height:1">+</span> Ajouter un exercice
        </button>`:''}

      ${exs.length===0&&!S.isOwner?`<div style="text-align:center;color:#8E8E93;padding:48px 0;font-size:13px">Aucun exercice pour ce jour 😴</div>`:''}
    </div>
    <div style="height:max(env(safe-area-inset-bottom,16px),16px)"></div>
  `;
}

// ── OVERVIEW ──────────────────────────────────────────────────────────────────
function renderOverview(){
  const app=document.getElementById("app");const p=S.currentProfile;
  app.innerHTML=`
    <div style="flex-shrink:0;padding:max(env(safe-area-inset-top,48px),48px) 16px 14px;border-bottom:1px solid #2C2C2E;display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:10px">
        <button onclick="G.goWorkout()" style="background:#2C2C2E;border:none;border-radius:10px;width:32px;height:32px;color:#F2F2F7;font-size:18px;display:flex;align-items:center;justify-content:center">‹</button>
        <div><div style="font-size:12px;color:#8E8E93">${p.emoji} ${p.name} · Vue d'ensemble</div><div style="font-size:20px;font-weight:700">12 Semaines</div></div>
      </div>
    </div>
    <div style="flex:1;overflow-y:auto;padding-bottom:32px">
      ${PHASES.map(ph=>`
        <div style="padding:14px 16px 0">
          <div style="font-size:11px;font-weight:700;letter-spacing:1px;color:${ph.color};margin-bottom:6px">${ph.name} — ${ph.label}</div>
          <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px">
            ${ph.weeks.map(w=>{
              const tot=DAYS.reduce((a,d)=>a+getDayExs(d).length,0);
              const dn=DAYS.reduce((a,d)=>a+getDayExs(d).filter((_,i)=>getLog(lk(w,d,i,0,"done"))).length,0);
              const pct=tot>0?Math.round((dn/tot)*100):0;
              const isCur=w===S.week;
              return `<button onclick="G.weekFromOverview(${w})" style="width:64px;border-radius:12px;padding:10px 6px;cursor:pointer;text-align:center;background:${isCur?ph.color:pct===100?'#1A3A1A':'#2C2C2E'};border:2px solid ${isCur?ph.color:pct===100?'#30D158':'transparent'}">
                <div style="font-size:13px;font-weight:700;color:${isCur?'#fff':pct===100?'#30D158':'#F2F2F7'}">S${w}</div>
                <div style="font-size:10px;color:${isCur?'rgba(255,255,255,0.7)':'#8E8E93'};margin-top:2px">${pct}%</div>
                ${pct===100?'<div style="font-size:11px;margin-top:2px">✅</div>':''}
              </button>`;
            }).join("")}
          </div>
        </div>`).join("")}
      <div style="margin:10px 16px;background:#2C2C2E;border-radius:14px;padding:14px">
        <div style="font-size:13px;font-weight:700;margin-bottom:12px">📈 Progression globale</div>
        ${PHASES.map(ph=>{
          const tot=ph.weeks.reduce((a,w)=>a+DAYS.reduce((b,d)=>b+getDayExs(d).length,0),0);
          const dn=ph.weeks.reduce((a,w)=>a+DAYS.reduce((b,d)=>b+getDayExs(d).filter((_,i)=>getLog(lk(w,d,i,0,"done"))).length,0),0);
          const pct=tot>0?Math.round((dn/tot)*100):0;
          return `<div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px;color:#8E8E93">${ph.name}</span><span style="font-size:12px;color:${ph.color}">${pct}%</span></div>
            <div style="height:4px;background:#1C1C1E;border-radius:2px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${ph.color};border-radius:2px"></div></div>
          </div>`;
        }).join("")}
      </div>
    </div>`;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderHome();
if("serviceWorker"in navigator){
  const sw=`self.addEventListener('install',()=>self.skipWaiting());self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>new Response('',{status:503}))))`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:"application/javascript"}))).catch(()=>{});
}
</script>
</body>
</html>

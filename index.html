function detectST(exs){
  if(!exs||!exs.length)return"REST";
  const c={};
  exs.forEach(ex=>{const l=LIB.find(e=>e.id===ex.libId);if(!l)return;const m=MG.find(m=>m.id===l.muscle);if(!m)return;c[m.session]=(c[m.session]||0)+1;});
  if(!Object.keys(c).length)return"CUSTOM";
  return Object.entries(c).sort((a,b)=>b[1]-a[1])[0][0];
}

/* ── AUTH ── */
function getSecret(){let k=localStorage.getItem("vtaper_secret");if(!k){k=crypto.randomUUID();localStorage.setItem("vtaper_secret",k);}return k;}
function getMyPid(){return localStorage.getItem("vtaper_pid");}
function setMyPid(id){localStorage.setItem("vtaper_pid",id);}

/* ── FIRESTORE ── */
async function loadProfiles(){const s=await getDocs(collection(db,"profiles"));return s.docs.map(d=>({id:d.id,...d.data()}));}
async function loadWD(pid){const s=await getDoc(doc(db,"workoutData",pid));return s.exists()?s.data():{days:{},logs:{}};}
async function saveWD(pid,d){await setDoc(doc(db,"workoutData",pid),{...d,updatedAt:serverTimestamp()},{merge:false});}
async function loadND(pid){const s=await getDoc(doc(db,"nutritionData",pid));return s.exists()?s.data():{profile:{},foodLog:{}};}
async function saveND(pid,d){await setDoc(doc(db,"nutritionData",pid),{...d,updatedAt:serverTimestamp()},{merge:false});}
async function loadSD(pid){const s=await getDoc(doc(db,"statsData",pid));return s.exists()?s.data():{sleep:{}};}
async function saveSD(pid,d){await setDoc(doc(db,"statsData",pid),{...d,updatedAt:serverTimestamp()},{merge:false});}
async function createProfile(name,emoji){
  const secret=getSecret();const id=name.toLowerCase().replace(/\s+/g,"_")+"_"+Date.now();
  const p={name,emoji,secretKey:secret,createdAt:serverTimestamp()};
  await setDoc(doc(db,"profiles",id),p);setMyPid(id);return{id,...p};
}
async function deleteProfile(pid){
  await Promise.all([deleteDoc(doc(db,"profiles",pid)),deleteDoc(doc(db,"workoutData",pid)),deleteDoc(doc(db,"nutritionData",pid)),deleteDoc(doc(db,"statsData",pid))]);
  localStorage.removeItem("vtaper_pid");
}
const saveSched=()=>{clearTimeout(saveTmr);saveTmr=setTimeout(async()=>{if(S.isOwner&&S.currentProfile)try{await saveWD(S.currentProfile.id,S.workoutData);}catch(e){}},1000);};

/* ── DATA HELPERS ── */
function getDayExs(day){return(S.workoutData.days[day]||{exercises:[]}).exercises;}
function setDayExs(day,exs){if(!S.workoutData.days[day])S.workoutData.days[day]={};S.workoutData.days[day].exercises=exs;saveSched();}
function getLog(k){return S.workoutData.logs[k]||"";}
function setLog(k,v){S.workoutData.logs[k]=v;saveSched();}
function lk(w,d,ei,si,f){return`w${w}_${d}_${ei}_s${si}_${f}`;}
function todayKey(){return new Date().toISOString().slice(0,10);}
function isDoneEx(week,day,ei){return!!getLog(lk(week,day,ei,0,"done"));}

/* ── VOLUME ── */
function calcVol(week,day){
  let t=0;
  getDayExs(day).forEach((ex,ei)=>{for(let si=0;si<(ex.sets||3);si++){const w=parseFloat(getLog(lk(week,day,ei,si,"weight")))||0;const r=parseFloat(getLog(lk(week,day,ei,si,"reps")))||0;t+=w*r;}});
  return Math.round(t);
}
function maxWeightEx(week,day,ei,sets){
  let mx=0;for(let si=0;si<sets;si++){const w=parseFloat(getLog(lk(week,day,ei,si,"weight")))||0;if(w>mx)mx=w;}return mx;
}

/* ── NUTRITION ── */
function calcTDEE(p){
  if(!p.weight||!p.height||!p.age||!p.sex)return null;
  const bmr=p.sex==="H"?(10*p.weight)+(6.25*p.height)-(5*p.age)+5:(10*p.weight)+(6.25*p.height)-(5*p.age)-161;
  const f={sedentaire:1.2,leger:1.375,modere:1.55,actif:1.725,tres_actif:1.9};
  const tdee=Math.round(bmr*(f[p.activity]||1.375));
  return{bmr:Math.round(bmr),tdee,targets:{seche:Math.round(tdee*0.8),maintien:tdee,bulk:Math.round(tdee*1.15)}};
}
function calcMacros(kcal){
  const np=S.nutritionData.profile;
  const prot=np.weight?Math.round(np.weight*2):Math.round(kcal*0.3/4);
  const fat=Math.round(kcal*0.25/9);
  const carb=Math.round((kcal-prot*4-fat*9)/4);
  return{prot,fat,carb};
}
async function searchFood(q){
  try{
    const r=await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&search_simple=1&action=process&json=1&page_size=6&fields=product_name,nutriments`);
    const d=await r.json();
    return(d.products||[]).filter(p=>p.product_name&&p.nutriments).map(p=>({
      name:p.product_name,
      kcal:Math.round(p.nutriments["energy-kcal_100g"]||p.nutriments["energy-kcal"]||0),
      prot:Math.round((p.nutriments.proteins_100g)||0),
      carb:Math.round((p.nutriments.carbohydrates_100g)||0),
      fat:Math.round((p.nutriments.fat_100g)||0),
      source:"off"
    }));
  }catch(e){return[];}
}

/* ── TIMER ── */
function fmt(s){return`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;}
function startTimer(secs,label){
  clearInterval(timerInt);S.timer={active:true,left:secs,label,total:secs};
  timerInt=setInterval(()=>{
    if(S.timer.left<=1){clearInterval(timerInt);S.timer={...S.timer,active:false,left:0};if(navigator.vibrate)navigator.vibrate([200,100,200]);}
    else S.timer.left-=1;
    updateTimerUI();
  },1000);updateTimerUI();
}
function stopTimer(){clearInterval(timerInt);S.timer={active:false,left:0,label:"",total:0};updateTimerUI();}
function togglePause(){
  if(S.timer.active){clearInterval(timerInt);S.timer.active=false;}
  else{S.timer.active=true;timerInt=setInterval(()=>{if(S.timer.left<=1){clearInterval(timerInt);S.timer={...S.timer,active:false,left:0};if(navigator.vibrate)navigator.vibrate([200,100,200]);}else S.timer.left-=1;updateTimerUI();},1000);}
  updateTimerUI();
}
function updateTimerUI(){
  const bar=document.getElementById("timer-bar");if(!bar)return;
  const t=S.timer;const st=ST[detectST(getDayExs(DAYS[S.day]))];
  if(!t.active&&t.left===0&&t.total===0){bar.style.display="none";return;}
  bar.style.display="block";bar.style.borderTop=`2px solid ${t.left===0?"#30D158":st.color}`;bar.style.background=t.left===0?"#0F300F":"#1C1C1E";
  const te=bar.querySelector(".t-time"),le=bar.querySelector(".t-label"),pb=bar.querySelector(".t-pause"),pr=bar.querySelector(".t-prog");
  if(te){te.textContent=t.left===0?"C'est parti 🚀":fmt(t.left);te.style.color=t.left===0?"#30D158":st.color;}
  if(le)le.textContent="⏱ "+t.label;
  if(pb){pb.textContent=t.active?"⏸":"▶️";pb.style.display=t.left>0?"flex":"none";}
  if(pr&&t.total>0)pr.style.width=`${(t.left/t.total)*100}%`;
}

function renderNutrition(){
  if(!S.currentProfile){setTopBar("Nutrition","🥗");document.getElementById("main-content").innerHTML=noProfileMsg();return;}
  const p=S.currentProfile;const np=S.nutritionData.profile||{};
  const goal=np.goal||"maintien";const gc=GOAL_COLORS[goal];
  const tdeeData=calcTDEE(np);const targetCals=tdeeData?tdeeData.targets[goal]:null;const macros=targetCals?calcMacros(targetCals):null;
  const today=todayKey();const todayLog=S.nutritionData.foodLog[today]||[];

        <div><div style="font-size:11px;color:#8E8E93">TDEE maintenance</div><div style="font-size:26px;font-weight:700;color:${gc}">${tdeeData.tdee} kcal</div></div>
        <div style="text-align:right"><div style="font-size:11px;color:#8E8E93">Cible ${GOAL_LABELS[goal]}</div><div style="font-size:20px;font-weight:700;color:${gc}">${targetCals} kcal</div></div>
      </div>
      ${macros?`<div style="display:flex;gap:6px">
        <div class="macro-pill" style="background:#FF6B3520;color:#FF6B35"><div style="font-size:16px;font-weight:700">${macros.prot}g</div><div style="font-size:10px">Protéines</div></div>
        <div class="macro-pill" style="background:#4ECDC420;color:#4ECDC4"><div style="font-size:16px;font-weight:700">${macros.carb}g</div><div style="font-size:10px">Glucides</div></div>
        <div class="macro-pill" style="background:#F59E0B20;color:#F59E0B"><div style="font-size:16px;font-weight:700">${macros.fat}g</div><div style="font-size:10px">Lipides</div></div>

          <select onchange="G.setNP('sex',this.value)"><option value="">—</option><option value="H" ${np.sex==="H"?"selected":""}>Homme</option><option value="F" ${np.sex==="F"?"selected":""}>Femme</option></select></div>
        <div><div style="font-size:11px;color:#8E8E93;margin-bottom:5px;font-weight:600">Âge</div><div style="display:flex;align-items:center;gap:6px"><input type="number" class="inp" style="width:100%;flex:1" placeholder="25" value="${np.age||""}" onchange="G.setNP('age',this.value)"/><span style="font-size:11px;color:#8E8E93">ans</span></div></div>

          ${[["sedentaire","Sédentaire (bureau, pas de sport)"],["leger","Légèrement actif (1-2x/semaine)"],["modere","Modérément actif (3-4x/semaine)"],["actif","Très actif (5-6x/semaine)"],["tres_actif","Athlète (2x/jour)"]].map(([v,l])=>`<option value="${v}" ${np.activity===v?"selected":""}>${l}</option>`).join("")}

/* ════════════════════════════════════════════

function renderStats(){
  if(!S.currentProfile){setTopBar("Stats","📊");document.getElementById("main-content").innerHTML=noProfileMsg();return;}
  const p=S.currentProfile;const week=S.week;const day=DAYS[S.day];
  const phase=getPhase(week);
  setTopBar(`${p.emoji} Stats`,"📊 Volume · Sommeil · Progression");

  // Per-exercise volumes for selected day+week
  const exs=getDayExs(day);
  const exVols=exs.map((ex,ei)=>{
    const lib=LIB.find(e=>e.id===ex.libId)||{name:"Exercice",measure:"weight+reps",muscle:""};
    const mg=MG.find(m=>m.id===lib.muscle);
    const sets=ex.sets||3;
    let vol=0;const setDetails=[];
    for(let si=0;si<sets;si++){const w=parseFloat(getLog(lk(week,day,ei,si,"weight")))||0;const r=parseFloat(getLog(lk(week,day,ei,si,"reps")))||0;const t=getLog(lk(week,day,ei,si,"time"))||"";vol+=w*r;setDetails.push({w,r,t});}
    let prevVol=0;for(let si=0;si<sets;si++){const w=parseFloat(getLog(lk(week-1,day,ei,si,"weight")))||0;const r=parseFloat(getLog(lk(week-1,day,ei,si,"reps")))||0;prevVol+=w*r;}
    const mx=maxWeightEx(week,day,ei,sets);
    return{lib,mg,vol:Math.round(vol),prevVol:Math.round(prevVol),mx,setDetails,measure:lib.measure,ei};
  });

  // Weekly volume bar chart
  const weekVols=DAYS.map(d=>({d,vol:calcVol(week,d)}));
  const maxVol=Math.max(...weekVols.map(w=>w.vol),1);

  // Long-term: volume per session (all weeks) for a given day
  const ltVolData=Array.from({length:12},(_,i)=>i+1).map(w=>({w,vol:calcVol(w,day)})).filter(x=>x.vol>0);

  // Long-term max weight per exercise (across all weeks)
  const allExIds=[...new Set(DAYS.flatMap(d=>getDayExs(d).map(e=>e.libId)))].filter(Boolean);
  const ltMaxWeight=allExIds.slice(0,8).map(libId=>{
    const lib=LIB.find(e=>e.id===libId);if(!lib)return null;
    const perWeek=Array.from({length:12},(_,wi)=>{
      const w=wi+1;
      let mx=0;
      DAYS.forEach(d=>{const exs2=getDayExs(d);const idx=exs2.findIndex(e=>e.libId===libId);if(idx<0)return;for(let si=0;si<(exs2[idx].sets||3);si++){const wv=parseFloat(getLog(lk(w,d,idx,si,"weight")))||0;if(wv>mx)mx=wv;}});
      return{w,mx};
    }).filter(x=>x.mx>0);
    return perWeek.length?{libId,name:lib.name,data:perWeek}:null;
  }).filter(Boolean);

  // Sleep
  const sleepEntries=Object.entries(S.statsData.sleep||{});
  const avgSleep=sleepEntries.length?Math.round(sleepEntries.reduce((a,[,v])=>a+v,0)/sleepEntries.length*10)/10:null;

  document.getElementById("main-content").innerHTML=`<div class="scroll-view" style="padding:12px 16px">

    <!-- Week + day picker -->
    <div style="display:flex;gap:4px;overflow-x:auto;margin-bottom:8px;padding-bottom:2px">
      ${Array.from({length:12},(_,i)=>i+1).map(w=>{const ph=getPhase(w);const a=w===S.week;return`<button class="week-btn" onclick="G.statsSetWeek(${w})" style="background:${a?ph.color+"30":"#2C2C2E"};border-color:${a?ph.color:"transparent"};color:${a?ph.color:"#8E8E93"}">${w}</button>`;}).join("")}
    </div>
    <div style="display:flex;gap:5px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px">
      ${DAYS.map((d,i)=>`<button onclick="G.statsSetDay(${i})" style="flex-shrink:0;padding:5px 10px;border-radius:16px;border:none;font-size:11px;font-weight:700;background:${i===S.day?"#4ECDC4":"#2C2C2E"};color:${i===S.day?"#111113":"#8E8E93"}">${d}</button>`).join("")}
    </div>

    <!-- Volume par exercice -->
    <div style="font-size:11px;color:#8E8E93;font-weight:700;letter-spacing:.6px;margin-bottom:8px">VOLUME PAR EXERCICE — S${week} ${day}</div>
    <div class="card" style="margin-bottom:14px">
      ${exVols.length===0?`<div style="text-align:center;color:#8E8E93;font-size:13px;padding:12px 0">Aucun exercice ce jour</div>`:
      exVols.map(({lib,mg,vol,prevVol,mx,setDetails,measure})=>{
        const diff=vol-prevVol;const hasPrev=week>1&&prevVol>0;
        return`<div class="stat-ex-row">
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${lib.name}</div>
            <div style="display:flex;align-items:center;gap:8px;margin-top:3px;flex-wrap:wrap">
              ${mg?`<span style="font-size:10px;font-weight:700;color:${mg.color}">${mg.label}</span>`:""}
              ${measure==="time"?`<span style="font-size:11px;color:#8E8E93">${setDetails.filter(s=>s.t).map((s,i)=>`S${i+1}:${s.t}`).join(" · ")||"—"}</span>`:
              `<span style="font-size:11px;color:#8E8E93">${setDetails.filter(s=>s.w||s.r).length}/${setDetails.length} séries</span>`}
            </div>
          </div>
          ${measure!=="time"?`<div style="text-align:right;flex-shrink:0;margin-left:10px">
            <div style="font-size:15px;font-weight:700;color:#4ECDC4">${vol?vol+"kg":"—"}</div>
            <div style="font-size:10px;color:#8E8E93">max: ${mx?mx+"kg":"—"}</div>
            ${hasPrev?`<div style="font-size:10px;font-weight:700;color:${diff>=0?"#30D158":"#FF3B30"}">${diff>=0?"+":""}${diff}kg</div>`:""}
          </div>`:""}
        </div>`;
      }).join("")}
      ${exVols.filter(e=>e.measure!=="time").length>0?`<div style="margin-top:10px;padding-top:10px;border-top:1px solid #2C2C2E;display:flex;justify-content:space-between"><span style="font-size:12px;color:#8E8E93">Volume total séance</span><span style="font-size:15px;font-weight:700;color:#4ECDC4">${calcVol(week,day)} kg</span></div>`:""}
    </div>

    <!-- Barchart volume semaine -->
    <div style="font-size:11px;color:#8E8E93;font-weight:700;letter-spacing:.6px;margin-bottom:8px">VOLUME PAR JOUR — SEMAINE ${week}</div>
    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;align-items:flex-end;gap:6px;height:70px;margin-bottom:4px">
        ${weekVols.map(({d,vol})=>{const h=maxVol>0?Math.max(4,Math.round((vol/maxVol)*60)):4;const isA=d===day;return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px"><div style="font-size:9px;color:#8E8E93">${vol>0?vol:""}</div><div style="width:100%;height:${h}px;background:${isA?"#4ECDC4":"#2C2C2E"};border-radius:4px 4px 0 0"></div></div>`;}).join("")}
      </div>
      <div style="display:flex;gap:6px">${weekVols.map(({d})=>`<div style="flex:1;text-align:center;font-size:9px;color:#8E8E93;font-weight:700">${d}</div>`).join("")}</div>
    </div>

    <!-- Long-term: Volume total par séance sur toutes les semaines -->
    ${ltVolData.length>=2?`
    <div style="font-size:11px;color:#8E8E93;font-weight:700;letter-spacing:.6px;margin-bottom:8px">PROGRESSION VOLUME — ${day} (toutes semaines)</div>
    <div class="card" style="margin-bottom:14px">
      ${(()=>{const maxV=Math.max(...ltVolData.map(x=>x.vol),1);return`<div style="display:flex;align-items:flex-end;gap:5px;height:70px;margin-bottom:4px">${ltVolData.map(({w,vol})=>{const h=Math.max(4,Math.round((vol/maxV)*60));const isA=w===week;return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px"><div style="font-size:9px;color:#8E8E93">${vol}</div><div style="width:100%;height:${h}px;background:${isA?"#FF6B35":"#2C2C2E"};border-radius:4px 4px 0 0"></div></div>`;}).join("")}</div><div style="display:flex;gap:5px">${ltVolData.map(({w})=>`<div style="flex:1;text-align:center;font-size:9px;color:#8E8E93">S${w}</div>`).join("")}</div>`;})()}
    </div>`:""}

    <!-- Long-term: poids max par exercice -->
    ${ltMaxWeight.length?`
    <div style="font-size:11px;color:#8E8E93;font-weight:700;letter-spacing:.6px;margin-bottom:8px">PROGRESSION POIDS MAX PAR EXERCICE</div>
    <div class="card" style="margin-bottom:14px">
      ${ltMaxWeight.map(({name,data})=>{
        const maxV=Math.max(...data.map(x=>x.mx),1);
        const first=data[0].mx;const last=data[data.length-1].mx;const diff=Math.round(((last-first)/first)*100);
        return`<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #2C2C2E;last-child:border-none">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
            <div style="font-size:12px;font-weight:700;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</div>
            <div style="font-size:11px;color:${diff>=0?"#30D158":"#FF3B30"};font-weight:700">${diff>=0?"+":""}${diff}% depuis S${data[0].w}</div>
          </div>
          <div style="display:flex;align-items:flex-end;gap:4px;height:48px;margin-bottom:3px">
            ${data.map(({w,mx})=>{const h=Math.max(4,Math.round((mx/maxV)*44));const isA=w===week;return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:1px"><div style="font-size:8px;color:#8E8E93">${mx}</div><div style="width:100%;height:${h}px;background:${isA?"#A855F7":"#2C2C2E"};border-radius:3px 3px 0 0"></div></div>`;}).join("")}
          </div>
          <div style="display:flex;gap:4px">${data.map(({w})=>`<div style="flex:1;text-align:center;font-size:8px;color:#8E8E93">S${w}</div>`).join("")}</div>
        </div>`;
      }).join("")}
    </div>`:""}

    <!-- Sommeil -->
    <div style="font-size:11px;color:#8E8E93;font-weight:700;letter-spacing:.6px;margin-bottom:8px">SOMMEIL</div>
    <div class="card" style="margin-bottom:14px">
      ${S.isOwner?`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <div style="font-size:13px;color:#8E8E93;flex-shrink:0">S${week} ${day}</div>
        <div style="display:flex;align-items:center;gap:6px;margin-left:auto">
          <input type="number" inputmode="decimal" step="0.5" min="0" max="24" placeholder="7.5" value="${S.statsData.sleep[`w${week}_${day}`]||""}" onchange="G.setSleep('w${week}_${day}',parseFloat(this.value))" style="width:60px;background:#111113;border:1px solid #2C2C2E;border-radius:8px;color:#F2F2F7;font-size:14px;font-weight:700;text-align:center;padding:6px;outline:none"/>
          <span style="font-size:12px;color:#8E8E93">heures</span>
        </div>
      </div>`:""}

        <div style="flex:1;background:${avgSleep>=7?"#30D15820":"#FF3B3020"};border-radius:10px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:700;color:${avgSleep>=7?"#30D158":"#FF3B30"}">${avgSleep}h</div><div style="font-size:10px;color:#8E8E93">Moy. sommeil</div></div>
        <div style="flex:1;background:#4ECDC420;border-radius:10px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:700;color:#4ECDC4">${sleepEntries.length}</div><div style="font-size:10px;color:#8E8E93">Nuits enreg.</div></div>
      </div>${buildSleepCorr()}`:`<div style="font-size:13px;color:#8E8E93;text-align:center;padding:10px 0">Enregistre ton sommeil pour voir l'analyse 🌙</div>`}

    <div style="font-size:11px;color:#8E8E93;font-weight:700;letter-spacing:.6px;margin-bottom:8px">PROGRESSION 12 SEMAINES</div>
    <div class="card" style="margin-bottom:20px">
      ${PHASES.map(ph=>{const tot=ph.weeks.reduce((a,w)=>a+DAYS.reduce((b,d)=>b+getDayExs(d).length,0),0);const dn=ph.weeks.reduce((a,w)=>a+DAYS.reduce((b,d)=>b+getDayExs(d).filter((_,i)=>isDoneEx(w,d,i)).length,0),0);const pct=tot>0?Math.round((dn/tot)*100):0;return`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px;color:#8E8E93">${ph.name} — ${ph.label}</span><span style="font-size:12px;color:${ph.color};font-weight:700">${pct}%</span></div><div style="height:5px;background:#1C1C1E;border-radius:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${ph.color};border-radius:3px"></div></div></div>`;}).join("")}
    </div>
  </div>`;
}

function buildSleepCorr(){
  const results=[];
  const allExIds=[...new Set(DAYS.flatMap(d=>getDayExs(d).map(e=>e.libId)))];
  allExIds.slice(0,5).forEach(libId=>{
    const lib=LIB.find(e=>e.id===libId);if(!lib)return;
    const good=[],bad=[];
    DAYS.forEach(d=>{
      const exs=getDayExs(d);const ei=exs.findIndex(e=>e.libId===libId);if(ei<0)return;
      for(let w=1;w<=12;w++){const sh=S.statsData.sleep[`w${w}_${d}`];if(!sh)continue;const ws=[];for(let si=0;si<(exs[ei].sets||3);si++){const wv=parseFloat(getLog(lk(w,d,ei,si,"weight")));if(wv)ws.push(wv);}if(!ws.length)continue;const avg=ws.reduce((a,b)=>a+b)/ws.length;sh>=7?good.push(avg):bad.push(avg);}
    });
    if(!good.length||!bad.length)return;
    const ag=Math.round(good.reduce((a,b)=>a+b)/good.length*10)/10;const ab=Math.round(bad.reduce((a,b)=>a+b)/bad.length*10)/10;
    const diff=Math.round(((ag-ab)/ab)*100);
    results.push({name:lib.name,ag,ab,diff});
  });
  if(!results.length)return`<div style="font-size:12px;color:#8E8E93;text-align:center;padding:8px 0">Pas encore assez de données 🔬</div>`;
  return`<div style="margin-top:4px"><div style="font-size:11px;color:#8E8E93;font-weight:700;margin-bottom:8px">⚡ PERF vs SOMMEIL</div>${results.map(r=>`<div style="margin-bottom:8px"><div style="font-size:12px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.name}</div><div style="display:flex;gap:8px;align-items:center"><span style="font-size:11px;color:#30D158">🌙 ≥7h: <b>${r.ag}kg</b></span><span style="font-size:11px;color:#FF6B35">😴 &lt;7h: <b>${r.ab}kg</b></span><span style="margin-left:auto;font-size:11px;font-weight:700;color:${r.diff>=0?"#30D158":"#FF3B30"}">${r.diff>=0?"+":""}${r.diff}%</span></div></div>`).join("")}</div>`;
}

function buildLibList(day){
  const filter=S.libFilter;const list=filter?LIB.filter(e=>e.muscle===filter):LIB;
  if(!list.length)return`<div style="text-align:center;color:#8E8E93;padding:20px">Aucun exercice</div>`;
  return list.map(ex=>{const mg=MG.find(m=>m.id===ex.muscle);const ml={"weight+reps":"🏋️ Poids+Reps","reps":"🔢 Reps","time":"⏱ Temps","weight+time":"🏋️ Poids+Temps"}[ex.measure]||"";return`<div class="lib-row" onclick="G.addExercise('${day}','${ex.id}')"><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:600;line-height:1.3">${ex.name}</div><div style="display:flex;gap:8px;margin-top:3px">${mg?`<span style="font-size:10px;font-weight:700;color:${mg.color}">${mg.label}</span>`:""}<span style="font-size:10px;color:#8E8E93">${ml}</span>${ex.tip?`<span style="font-size:10px;color:#8E8E93;font-style:italic">· ${ex.tip}</span>`:""}</div></div><div style="font-size:22px;color:#4ECDC4;font-weight:700;margin-left:10px">+</div></div>`;}).join("");
}

/* ════════════════════════════════════════════
   GLOBAL HANDLERS
════════════════════════════════════════════ */
window.G={
  startTimer,stopTimer,togglePause,
  setTab(id){S.tab=id;updateNav();if(id==="home")renderHome();else if(id==="workout")renderWorkout();else if(id==="nutrition")renderNutrition();else if(id==="stats")renderStats();},
  setWeek(w){S.week=w;renderWorkout();},
  statsSetWeek(w){S.week=w;renderStats();},
  statsSetDay(i){S.day=i;renderStats();},
  setDay(i){
    S.day=i;
    if(S.tab==="workout"){const sc=document.getElementById("scroll-content");const sy=sc?sc.scrollTop:0;renderWorkoutContent();if(sc)requestAnimationFrame(()=>{sc.scrollTop=sy;});}
  },
  toggleDone(day,ei){
    if(!S.isOwner)return;
    const sc=document.getElementById("scroll-content");const sy=sc?sc.scrollTop:0;
    const k=lk(S.week,day,ei,0,"done");setLog(k,getLog(k)?"":"1");
    renderWorkoutContent();if(sc)requestAnimationFrame(()=>{sc.scrollTop=sy;});
  },
  logInput(week,day,ei,si,field,val){if(!S.isOwner)return;setLog(lk(week,day,ei,si,field),val);},
  changeSets(day,ei,delta){if(!S.isOwner)return;const sc=document.getElementById("scroll-content");const sy=sc?sc.scrollTop:0;const exs=[...getDayExs(day)];exs[ei].sets=Math.max(1,Math.min(8,(exs[ei].sets||3)+delta));setDayExs(day,exs);renderWorkoutContent();if(sc)requestAnimationFrame(()=>{sc.scrollTop=sy;});},
  changeReps(day,ei,delta){if(!S.isOwner)return;const sc=document.getElementById("scroll-content");const sy=sc?sc.scrollTop:0;const exs=[...getDayExs(day)];exs[ei].reps=Math.max(1,Math.min(50,(exs[ei].reps||10)+delta));setDayExs(day,exs);renderWorkoutContent();if(sc)requestAnimationFrame(()=>{sc.scrollTop=sy;});},
  removeExercise(day,ei){if(!S.isOwner)return;const sc=document.getElementById("scroll-content");const sy=sc?sc.scrollTop:0;const exs=[...getDayExs(day)];exs.splice(ei,1);setDayExs(day,exs);renderWorkoutContent();if(sc)requestAnimationFrame(()=>{sc.scrollTop=sy;});},
  openLibrary(day){if(!S.isOwner)return;S.libFilter=null;S._libDay=day;renderLibModal(day);},
  setLibFilter(m){S.libFilter=m;const el=document.getElementById("lib-list");if(el)el.innerHTML=buildLibList(S._libDay);},
  addExercise(day,libId){const exs=[...getDayExs(day)];exs.push({libId,sets:3,reps:10});setDayExs(day,exs);closeModal();const sc=document.getElementById("scroll-content");const sy=sc?sc.scrollTop:0;renderWorkoutContent();if(sc)requestAnimationFrame(()=>{sc.scrollTop=sy;});},
  // Nutrition
  setGoal(g){if(!S.isOwner)return;S.nutritionData.profile.goal=g;nutSched();renderNutrition();},
  setNP(key,val){if(!S.isOwner)return;S.nutritionData.profile[key]=isNaN(val)||val===""?val:parseFloat(val);nutSched();if(["weight","height","age","sex","activity"].includes(key))renderNutrition();},
  openFoodSearch,
  openManualFood,
  async doFoodSearch(val){
    clearTimeout(foodSearchTimer);
    const el=document.getElementById("fresults");if(!el)return;
    if(!val.trim()){el.innerHTML=`<div style="text-align:center;color:#8E8E93;padding:20px">Tape pour rechercher</div>`;return;}
    el.innerHTML=`<div style="text-align:center;padding:20px"><div class="spinner"></div></div>`;
    foodSearchTimer=setTimeout(async()=>{
      const results=await searchFood(val);
      if(!document.getElementById("fresults"))return;
      if(!results.length){document.getElementById("fresults").innerHTML=`<div style="text-align:center;color:#8E8E93;padding:20px">Aucun résultat — essaie en anglais ou utilise la saisie manuelle</div>`;return;}
      window._foodResults=results;
      document.getElementById("fresults").innerHTML=results.map((f,i)=>`<div class="food-row" style="padding:10px 0">
        <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${f.name}</div><div style="font-size:11px;color:#8E8E93;margin-top:2px">${f.kcal}kcal · P:${f.prot}g · G:${f.carb}g · L:${f.fat}g <span>/ 100g</span></div></div>
        <button onclick="G.pickFood(${i})" style="background:#4ECDC420;border:1px solid #4ECDC4;border-radius:8px;padding:6px 10px;color:#4ECDC4;font-size:12px;font-weight:700;flex-shrink:0;margin-left:8px">+</button>
      </div>`).join("");
    },600);
  },
  pickFood(idx){
    const f=(window._foodResults||[])[idx];if(!f)return;
    closeModal();
    // Show quantity picker
    const mc=document.getElementById("modal-container");
    mc.innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal-box" style="padding:24px 20px 32px" onclick="event.stopPropagation()">
      <div style="font-size:16px;font-weight:700;margin-bottom:4px">${f.name}</div>
      <div style="font-size:12px;color:#8E8E93;margin-bottom:16px">${f.kcal}kcal · P:${f.prot}g · G:${f.carb}g · L:${f.fat}g / 100g</div>
      <div style="font-size:12px;color:#8E8E93;margin-bottom:6px;font-weight:600">QUANTITÉ</div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
        <input type="number" id="fg" value="100" min="1" max="2000" class="modal-input" style="margin:0;width:100px;text-align:center" oninput="document.getElementById('fkcal').textContent=Math.round(${f.kcal}*this.value/100)+' kcal'"/>
        <span style="font-size:14px;color:#8E8E93">g</span>
        <div style="margin-left:auto;text-align:right"><div id="fkcal" style="font-size:20px;font-weight:700;color:#F59E0B">${f.kcal} kcal</div><div style="font-size:11px;color:#8E8E93">estimé</div></div>
      </div>
      <button class="btn-primary" style="background:#4ECDC4;color:#111113" onclick="G.confirmFood(${JSON.stringify(f).replace(/"/g,'&quot;')})">Ajouter</button>
      <button class="btn-secondary" onclick="closeModal()">Annuler</button>
    </div></div>`;
  },
  confirmFood(f){
    const g=parseFloat(document.getElementById("fg")?.value)||100;
    const today=todayKey();if(!S.nutritionData.foodLog[today])S.nutritionData.foodLog[today]=[];
    S.nutritionData.foodLog[today].push({...f,grams:g});
    nutSched();closeModal();renderNutrition();
  },
  addManualFood(){
    const name=document.getElementById("mf-name")?.value.trim();if(!name)return;
    const kcal=parseFloat(document.getElementById("mf-kcal")?.value)||0;
    const prot=parseFloat(document.getElementById("mf-prot")?.value)||0;
    const carb=parseFloat(document.getElementById("mf-carb")?.value)||0;
    const fat=parseFloat(document.getElementById("mf-fat")?.value)||0;
    const grams=parseFloat(document.getElementById("mf-grams")?.value)||100;
    const today=todayKey();if(!S.nutritionData.foodLog[today])S.nutritionData.foodLog[today]=[];
    S.nutritionData.foodLog[today].push({name,kcal,prot,carb,fat,grams,source:"manual"});
    nutSched();closeModal();renderNutrition();
  },
  removeFood(idx){if(!S.isOwner)return;const today=todayKey();S.nutritionData.foodLog[today].splice(idx,1);nutSched();renderNutrition();},
  // Stats
  setSleep(key,val){if(!S.isOwner||isNaN(val))return;S.statsData.sleep[key]=val;statsSched();renderStats();},
  // Delete
  showDeleteConfirm(){
    const app=document.getElementById("app");if(document.getElementById("del-ov"))return;
    const ov=document.createElement("div");ov.id="del-ov";ov.className="modal-overlay";
    ov.innerHTML=`<div class="modal-box" style="padding:24px 20px 32px" onclick="event.stopPropagation()"><div style="text-align:center;margin-bottom:16px"><div style="font-size:40px;margin-bottom:12px">🗑️</div><div style="font-size:18px;font-weight:700;margin-bottom:8px">Supprimer mon profil ?</div><div style="font-size:13px;color:#8E8E93;line-height:1.5">Toutes les données seront <strong style="color:#FF3B30">définitivement supprimées</strong>.</div></div><button class="btn-primary" id="del-btn" style="background:#FF3B30" onclick="G.confirmDelete()">Oui, supprimer définitivement</button><button class="btn-secondary" onclick="document.getElementById('del-ov').remove()">Annuler</button></div>`;
    app.appendChild(ov);
  },
  async confirmDelete(){
    const btn=document.getElementById("del-btn");if(btn){btn.textContent="Suppression...";btn.disabled=true;}
    try{
      await deleteProfile(S.currentProfile.id);S.profiles=S.profiles.filter(p=>p.id!==S.currentProfile.id);
      S.currentProfile=null;S.isOwner=false;S.workoutData={days:{},logs:{}};S.nutritionData={profile:{},foodLog:{}};S.statsData={sleep:{}};
      S.tab="home";renderShell();updateNav();renderHome();
    }catch(e){if(btn){btn.textContent="Erreur";btn.disabled=false;}}
  },
};

window.renderHome=renderHome;window.closeModal=closeModal;

function detectST(exs){
  if(!exs||!exs.length)return"REST";
  const c={};
  exs.forEach(ex=>{const l=LIB.find(e=>e.id===ex.libId);if(!l)return;const m=MG.find(m=>m.id===l.muscle);if(!m)return;c[m.session]=(c[m.session]||0)+1;});
  if(!Object.keys(c).length)return"CUSTOM";
  return Object.entries(c).sort((a,b)=>b[1]-a[1])[0][0];
}

};

/* ── AUTH ── */
function getSecret(){let k=localStorage.getItem("vtaper_secret");if(!k){k=crypto.randomUUID();localStorage.setItem("vtaper_secret",k);}return k;}
function getMyPid(){return localStorage.getItem("vtaper_pid");}
function setMyPid(id){localStorage.setItem("vtaper_pid",id);}

/* ── FIRESTORE ── */
async function loadProfiles(){const s=await getDocs(collection(db,"profiles"));return s.docs.map(d=>({id:d.id,...d.data()}));}
async function loadWD(pid){const s=await getDoc(doc(db,"workoutData",pid));return s.exists()?s.data():{days:{},logs:{}};}
async function saveWD(pid,d){await setDoc(doc(db,"workoutData",pid),{...d,updatedAt:serverTimestamp()},{merge:false});}
async function loadND(pid){const s=await getDoc(doc(db,"nutritionData",pid));return s.exists()?s.data():{profile:{},foodLog:{}};}
async function saveND(pid,d){await setDoc(doc(db,"nutritionData",pid),{...d,updatedAt:serverTimestamp()},{merge:false});}
async function loadSD(pid){const s=await getDoc(doc(db,"statsData",pid));return s.exists()?s.data():{sleep:{}};}
async function saveSD(pid,d){await setDoc(doc(db,"statsData",pid),{...d,updatedAt:serverTimestamp()},{merge:false});}
async function createProfile(name,emoji){
  const secret=getSecret();const id=name.toLowerCase().replace(/\s+/g,"_")+"_"+Date.now();
  const p={name,emoji,secretKey:secret,createdAt:serverTimestamp()};
  await setDoc(doc(db,"profiles",id),p);setMyPid(id);return{id,...p};
}
async function deleteProfile(pid){
  await Promise.all([deleteDoc(doc(db,"profiles",pid)),deleteDoc(doc(db,"workoutData",pid)),deleteDoc(doc(db,"nutritionData",pid)),deleteDoc(doc(db,"statsData",pid))]);
  localStorage.removeItem("vtaper_pid");
}
const sched=(fn,ref,ms=1000)=>{clearTimeout(ref[0]);ref[0]=setTimeout(fn,ms);};
const saveSched=()=>sched(async()=>{if(S.isOwner&&S.currentProfile)try{await saveWD(S.currentProfile.id,S.workoutData);}catch(e){}},{0:saveTmr});
const nutSched=()=>sched(async()=>{if(S.isOwner&&S.currentProfile)try{await saveND(S.currentProfile.id,S.nutritionData);}catch(e){}},{0:nutTmr});
const statsSched=()=>sched(async()=>{if(S.isOwner&&S.currentProfile)try{await saveSD(S.currentProfile.id,S.statsData);}catch(e){}},{0:statsTmr});

/* ── DATA HELPERS ── */
function getDayExs(day){return(S.workoutData.days[day]||{exercises:[]}).exercises;}
function setDayExs(day,exs){if(!S.workoutData.days[day])S.workoutData.days[day]={};S.workoutData.days[day].exercises=exs;saveSched();}
function getLog(k){return S.workoutData.logs[k]||"";}
function setLog(k,v){S.workoutData.logs[k]=v;saveSched();}
function lk(w,d,ei,si,f){return`w${w}_${d}_${ei}_s${si}_${f}`;}
function todayKey(){return new Date().toISOString().slice(0,10);}
function isDoneEx(week,day,ei){return!!getLog(lk(week,day,ei,0,"done"));}

/* ── VOLUME ── */
function calcVol(week,day){
  let t=0;
  getDayExs(day).forEach((ex,ei)=>{for(let si=0;si<(ex.sets||3);si++){const w=parseFloat(getLog(lk(week,day,ei,si,"weight")))||0;const r=parseFloat(getLog(lk(week,day,ei,si,"reps")))||0;t+=w*r;}});
  return Math.round(t);
}
function maxWeightEx(week,day,ei,sets){
  let mx=0;for(let si=0;si<sets;si++){const w=parseFloat(getLog(lk(week,day,ei,si,"weight")))||0;if(w>mx)mx=w;}return mx;
}

/* ── NUTRITION ── */
function calcTDEE(p){
  if(!p.weight||!p.height||!p.age||!p.sex)return null;
  const bmr=p.sex==="H"?(10*p.weight)+(6.25*p.height)-(5*p.age)+5:(10*p.weight)+(6.25*p.height)-(5*p.age)-161;
  const f={sedentaire:1.2,leger:1.375,modere:1.55,actif:1.725,tres_actif:1.9};
  const tdee=Math.round(bmr*(f[p.activity]||1.375));
  return{bmr:Math.round(bmr),tdee,targets:{seche:Math.round(tdee*0.8),maintien:tdee,bulk:Math.round(tdee*1.15)}};
}
function calcMacros(kcal){
  const np=S.nutritionData.profile;
  const prot=np.weight?Math.round(np.weight*2):Math.round(kcal*0.3/4);
  const fat=Math.round(kcal*0.25/9);
  const carb=Math.round((kcal-prot*4-fat*9)/4);
  return{prot,fat,carb};
}

function translateFR(q){
  const ql=q.toLowerCase().trim();
  // Essai direct
  for(const[fr,en]of Object.entries(FR_EN)){
    if(ql.includes(fr))return ql.replace(fr,en);
  }
  return ql; // retourne tel quel si pas de traduction
}

async function searchUSDA(q){
  try{
    const enQuery=translateFR(q);
    const url=`https://api.nal.usda.gov/fdc/v1/foods/search?query=${encodeURIComponent(enQuery)}&dataType=Foundation,SR%20Legacy&pageSize=6&api_key=${USDA_KEY}`;
    const r=await fetch(url);const d=await r.json();
    if(!d.foods)return[];
    return d.foods.slice(0,6).map(f=>{
      const nutr=f.foodNutrients||[];
      const get=n=>Math.round((nutr.find(x=>x.nutrientName&&x.nutrientName.includes(n))?.value)||0);
      return{
        id:"usda_"+f.fdcId,
        name:f.description,
        nameFR:q, // garde le terme français saisi
        kcal:get("Energy"),
        prot:get("Protein"),
        carb:get("Carbohydrate"),
        fat:get("Total lipid"),
        source:"usda",cat:"🔬 USDA"
      };
    }).filter(f=>f.kcal>0);
  }catch(e){return[];}
}

async function searchFood(q){
  if(!q.trim())return[];
  // 1. Base locale FR (instantané)
  const local=searchFoodLocal(q);
  if(local.length>=4)return local;
  // 2. USDA (aliments bruts, h24, illimité)
  const usda=await searchUSDA(q);
  // 3. Open Food Facts en dernier recours (produits emballés)
  let off=[];
  if(local.length+usda.length<3){
    try{
      const r=await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&search_simple=1&action=process&json=1&page_size=4&fields=product_name,nutriments`);
      const d=await r.json();
      off=(d.products||[]).filter(p=>p.product_name&&p.nutriments&&p.nutriments["energy-kcal_100g"]).slice(0,4).map(p=>({
        id:"off_"+Math.random(),name:p.product_name,
        kcal:Math.round(p.nutriments["energy-kcal_100g"]||0),
        prot:Math.round(p.nutriments.proteins_100g||0),
        carb:Math.round(p.nutriments.carbohydrates_100g||0),
        fat:Math.round(p.nutriments.fat_100g||0),
        source:"off",cat:"📦 Produit emballé"
      }));
    }catch(e){}
  }
  // Merge sans doublons
  const all=[...local,...usda,...off];
  const seen=new Set();
  return all.filter(f=>{const k=f.name.toLowerCase().slice(0,20);if(seen.has(k))return false;seen.add(k);return true;}).slice(0,8);
}


/* ── TIMER ── */
function fmt(s){return`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;}
function startTimer(secs,label){
  clearInterval(timerInt);S.timer={active:true,left:secs,label,total:secs};
  timerInt=setInterval(()=>{
    if(S.timer.left<=1){clearInterval(timerInt);S.timer={...S.timer,active:false,left:0};if(navigator.vibrate)navigator.vibrate([200,100,200]);}
    else S.timer.left-=1;
    updateTimerUI();
  },1000);updateTimerUI();
}
function stopTimer(){clearInterval(timerInt);S.timer={active:false,left:0,label:"",total:0};updateTimerUI();}
function togglePause(){
  if(S.timer.active){clearInterval(timerInt);S.timer.active=false;}
  else{S.timer.active=true;timerInt=setInterval(()=>{if(S.timer.left<=1){clearInterval(timerInt);S.timer={...S.timer,active:false,left:0};if(navigator.vibrate)navigator.vibrate([200,100,200]);}else S.timer.left-=1;updateTimerUI();},1000);}
  updateTimerUI();
}
function updateTimerUI(){
  const bar=document.getElementById("timer-bar");if(!bar)return;
  const t=S.timer;const st=ST[detectST(getDayExs(DAYS[S.day]))];
  if(!t.active&&t.left===0&&t.total===0){bar.style.display="none";return;}
  bar.style.display="block";bar.style.borderTop=`2px solid ${t.left===0?"#30D158":st.color}`;bar.style.background=t.left===0?"#0F300F":"#1C1C1E";
  const te=bar.querySelector(".t-time"),le=bar.querySelector(".t-label"),pb=bar.querySelector(".t-pause"),pr=bar.querySelector(".t-prog");
  if(te){te.textContent=t.left===0?"C'est parti 🚀":fmt(t.left);te.style.color=t.left===0?"#30D158":st.color;}
  if(le)le.textContent="⏱ "+t.label;
  if(pb){pb.textContent=t.active?"⏸":"▶️";pb.style.display=t.left>0?"flex":"none";}
  if(pr&&t.total>0)pr.style.width=`${(t.left/t.total)*100}%`;
}

/* ════════════════════════════════════════════
   SHARE CARDS — Canvas natif
════════════════════════════════════════════ */
function drawRoundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

function shareCanvas(canvas,filename){
  canvas.toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[new File([blob],"vtaper.png",{type:"image/png"})]})){
      navigator.share({files:[new File([blob],filename,{type:"image/png"})],title:"V-Taper"}).catch(()=>{});
    } else {
      const a=document.createElement("a");a.href=url;a.download=filename;a.click();
    }
    setTimeout(()=>URL.revokeObjectURL(url),2000);
  },"image/png");
}

    ctx.font="bold 22px -apple-system,sans-serif";ctx.fillStyle=full?dst.color:"#8E8E93";
    ctx.fillText(d,x+cardW/2,y+80);
    ctx.font="bold 22px -apple-system,sans-serif";ctx.fillStyle=full?"#30D158":"#8E8E93";
    ctx.fillText(dst.label,x+cardW/2,y+110);
    if(vol){ctx.font="bold 24px -apple-system,sans-serif";ctx.fillStyle=dst.color;ctx.fillText(`${vol}kg`,x+cardW/2,y+145);}
    ctx.font="22px -apple-system,sans-serif";ctx.fillStyle="#8E8E93";
    ctx.fillText(`${dn}/${exs.length}`,x+cardW/2,y+175);
  });

  // Volume chart
  const vols=DAYS.map(d=>calcVol(week,d));const maxV=Math.max(...vols,1);
  const barW=80;const barArea=W-120;const barSpacing=barArea/7;
  const chartTop=600;const chartH=180;
  ctx.font="bold 30px -apple-system,sans-serif";ctx.fillStyle="#8E8E93";ctx.textAlign="left";
  ctx.fillText("VOLUME PAR JOUR",60,590);
  vols.forEach((v,i)=>{
    const bx=60+i*barSpacing+(barSpacing-barW)/2;
    const bh=v>0?Math.max(8,Math.round((v/maxV)*chartH)):4;
    const by=chartTop+chartH-bh;
    drawRoundRect(ctx,bx,by,barW,bh,6);
    ctx.fillStyle=v>0?phase.color+"80":"#2C2C2E";ctx.fill();
    if(v>0){ctx.font="bold 22px -apple-system,sans-serif";ctx.fillStyle=phase.color;ctx.textAlign="center";ctx.fillText(v,bx+barW/2,by-10);}
    ctx.font="bold 24px -apple-system,sans-serif";ctx.fillStyle="#8E8E93";
    ctx.fillText(DAYS[i],bx+barW/2,chartTop+chartH+34);
  });

  // Total volume + stats
  const totalVol=vols.reduce((a,b)=>a+b,0);
  ctx.strokeStyle="#2C2C2E";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(60,840);ctx.lineTo(W-60,840);ctx.stroke();
  const bigs=[{l:"SÉANCES",v:`${DAYS.filter(d=>getDayExs(d).length>0).length}/7`},{l:"VOLUME TOTAL",v:`${totalVol}kg`},{l:"PROGRESSION",v:`${weekPct}%`}];
  bigs.forEach((b,i)=>{const x=60+(W-120)/3*i+(W-120)/6;ctx.font="bold 72px -apple-system,sans-serif";ctx.fillStyle=phase.color;ctx.textAlign="center";ctx.fillText(b.v,x,940);ctx.font="bold 26px -apple-system,sans-serif";ctx.fillStyle="#8E8E93";ctx.fillText(b.l,x,980);});

  // 12-week phase progress
  ctx.strokeStyle="#2C2C2E";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(60,1020);ctx.lineTo(W-60,1020);ctx.stroke();
  ctx.font="bold 30px -apple-system,sans-serif";ctx.fillStyle="#8E8E93";ctx.textAlign="left";ctx.fillText("PROGRESSION 12 SEMAINES",60,1070);
  PHASES.forEach((ph,i)=>{
    const y=1100+i*80;const tot=ph.weeks.reduce((a,w)=>a+DAYS.reduce((b,d)=>b+getDayExs(d).length,0),0);
    const dn2=ph.weeks.reduce((a,w)=>a+DAYS.reduce((b,d)=>b+getDayExs(d).filter((_,j)=>isDoneEx(w,d,j)).length,0),0);
    const pct=tot>0?Math.round((dn2/tot)*100):0;
    ctx.font="bold 28px -apple-system,sans-serif";ctx.fillStyle="#F2F2F7";ctx.textAlign="left";ctx.fillText(ph.name,60,y);
    ctx.font="bold 28px -apple-system,sans-serif";ctx.fillStyle=ph.color;ctx.textAlign="right";ctx.fillText(`${pct}%`,W-60,y);
    drawRoundRect(ctx,60,y+10,W-120,12,6);ctx.fillStyle="#2C2C2E";ctx.fill();
    if(pct>0){drawRoundRect(ctx,60,y+10,Math.max(12,(W-120)*pct/100),12,6);ctx.fillStyle=ph.color;ctx.fill();}
  });

  ctx.font="28px -apple-system,sans-serif";ctx.fillStyle="#ffffff20";ctx.textAlign="center";ctx.fillText("vtaper.app",W/2,H-40);
  shareCanvas(canvas,`vtaper_semaine_${week}.png`);
}

// ── CARTE 3 : Nutrition ───────────────────────────────────────────────────────
function generateNutritionCard(){
  const p=S.currentProfile;const np=S.nutritionData.profile||{};
  const goal=np.goal||"maintien";const gc=GOAL_COLORS[goal];
  const tdeeData=calcTDEE(np);const targetCals=tdeeData?tdeeData.targets[goal]:null;
  const today=todayKey();const todayLog=S.nutritionData.foodLog[today]||[];
  const totKcal=todayLog.reduce((a,f)=>a+((f.kcal||0)*(f.grams||100)/100),0);
  const totProt=todayLog.reduce((a,f)=>a+((f.prot||0)*(f.grams||100)/100),0);
  const totCarb=todayLog.reduce((a,f)=>a+((f.carb||0)*(f.grams||100)/100),0);
  const totFat=todayLog.reduce((a,f)=>a+((f.fat||0)*(f.grams||100)/100),0);
  const pct=targetCals?Math.min(100,Math.round((totKcal/targetCals)*100)):0;

  const W=1080,H=1080;
  const canvas=document.createElement("canvas");canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext("2d");

  ctx.fillStyle="#0A0A0C";ctx.fillRect(0,0,W,H);
  const acc=ctx.createLinearGradient(0,0,W,300);acc.addColorStop(0,gc+"30");acc.addColorStop(1,"transparent");
  ctx.fillStyle=acc;ctx.fillRect(0,0,W,300);
  ctx.fillStyle=gc;ctx.fillRect(0,0,W,8);

  // Header
  ctx.font="bold 32px -apple-system,sans-serif";ctx.fillStyle="#ffffff30";ctx.textAlign="left";ctx.fillText("V-TAPER",60,80);
  ctx.font="bold 44px -apple-system,sans-serif";ctx.fillStyle="#F2F2F7";ctx.textAlign="center";ctx.fillText(`${p.emoji}  ${p.name}`,W/2,120);
  ctx.font="bold 36px -apple-system,sans-serif";ctx.fillStyle=gc;ctx.fillText(GOAL_LABELS[goal],W/2,170);
  ctx.font="bold 28px -apple-system,sans-serif";ctx.fillStyle="#8E8E93";
  ctx.fillText(new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"}),W/2,215);

  // Donut chart
  const cx=W/2,cy=440,r=160,lineW=36;
  ctx.strokeStyle="#2C2C2E";ctx.lineWidth=lineW;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
  if(pct>0){
    const angle=(pct/100)*Math.PI*2-Math.PI/2;
    ctx.strokeStyle=totKcal>targetCals?"#EF4444":gc;ctx.lineWidth=lineW;
    ctx.lineCap="round";ctx.beginPath();ctx.arc(cx,cy,r,-Math.PI/2,angle);ctx.stroke();
    ctx.lineCap="butt";
  }
  ctx.font="bold 100px -apple-system,sans-serif";ctx.fillStyle="#F2F2F7";ctx.textAlign="center";ctx.fillText(Math.round(totKcal),cx,cy+18);
  ctx.font="bold 32px -apple-system,sans-serif";ctx.fillStyle="#8E8E93";ctx.fillText("kcal mangées",cx,cy+62);
  if(targetCals){ctx.font="bold 28px -apple-system,sans-serif";ctx.fillStyle=gc;ctx.fillText(`/ ${targetCals} kcal objectif`,cx,cy+100);}

  // Macros
  const macros=[{l:"Protéines",v:Math.round(totProt),u:"g",c:"#FF6B35"},{l:"Glucides",v:Math.round(totCarb),u:"g",c:"#4ECDC4"},{l:"Lipides",v:Math.round(totFat),u:"g",c:"#F59E0B"}];
  macros.forEach((m,i)=>{
    const x=60+(W-120)/3*i;const y=680;const mW=(W-120)/3-20;
    drawRoundRect(ctx,x,y,mW,180,20);ctx.fillStyle=m.c+"20";ctx.fill();
    ctx.strokeStyle=m.c+"50";ctx.lineWidth=1;ctx.stroke();
    ctx.font="bold 70px -apple-system,sans-serif";ctx.fillStyle=m.c;ctx.textAlign="center";ctx.fillText(`${m.v}${m.u}`,x+mW/2,y+90);
    ctx.font="bold 26px -apple-system,sans-serif";ctx.fillStyle="#8E8E93";ctx.fillText(m.l,x+mW/2,y+140);
  });

  // Food list (max 5)
  ctx.strokeStyle="#2C2C2E";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(60,890);ctx.lineTo(W-60,890);ctx.stroke();
  todayLog.slice(0,5).forEach((f,i)=>{
    const y=930+i*26;const kcal=Math.round((f.kcal||0)*f.grams/100);
    ctx.font="24px -apple-system,sans-serif";ctx.fillStyle="#8E8E93";ctx.textAlign="left";
    ctx.fillText((f.name||"").slice(0,40),60,y);
    ctx.font="bold 24px -apple-system,sans-serif";ctx.fillStyle=gc;ctx.textAlign="right";ctx.fillText(`${kcal}kcal`,W-60,y);
  });
  if(todayLog.length>5){ctx.font="22px -apple-system,sans-serif";ctx.fillStyle="#8E8E93";ctx.textAlign="center";ctx.fillText(`+${todayLog.length-5} autres aliments`,W/2,930+5*26);}

  ctx.font="28px -apple-system,sans-serif";ctx.fillStyle="#ffffff20";ctx.textAlign="center";ctx.fillText("vtaper.app",W/2,H-20);
  shareCanvas(canvas,`vtaper_nutrition_${today}.png`);
}

// ── CARTE 4 : Progression long terme ─────────────────────────────────────────
function generateProgressionCard(){
  const p=S.currentProfile;const week=S.week;
  const allExIds=[...new Set(DAYS.flatMap(d=>getDayExs(d).map(e=>e.libId)))].filter(Boolean);
  // Prend l'exercice avec le plus de données
  let bestEx=null;let bestData=[];
  allExIds.forEach(libId=>{
    const data=Array.from({length:12},(_,wi)=>{const w=wi+1;let mx=0;DAYS.forEach(d=>{const exs2=getDayExs(d);const idx=exs2.findIndex(e=>e.libId===libId);if(idx<0)return;for(let si=0;si<(exs2[idx].sets||3);si++){const wv=parseFloat(getLog(lk(w,d,idx,si,"weight")))||0;if(wv>mx)mx=wv;}});return{w,mx};}).filter(x=>x.mx>0);
    if(data.length>bestData.length){bestData=data;bestEx=libId;}
  });
  const lib=LIB.find(e=>e.id===bestEx)||{name:"Exercice"};
  const mg=MG.find(m=>lib.muscle&&m.id===lib.muscle);

  const W=1080,H=1080;
  const canvas=document.createElement("canvas");canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext("2d");
  const color=mg?mg.color:"#4ECDC4";

  ctx.fillStyle="#0A0A0C";ctx.fillRect(0,0,W,H);
  const acc=ctx.createLinearGradient(0,0,W,300);acc.addColorStop(0,color+"30");acc.addColorStop(1,"transparent");
  ctx.fillStyle=acc;ctx.fillRect(0,0,W,300);
  ctx.fillStyle=color;ctx.fillRect(0,0,W,8);

  ctx.font="bold 32px -apple-system,sans-serif";ctx.fillStyle="#ffffff30";ctx.textAlign="left";ctx.fillText("V-TAPER",60,80);
  ctx.font="bold 44px -apple-system,sans-serif";ctx.fillStyle="#F2F2F7";ctx.textAlign="center";ctx.fillText(`${p.emoji}  ${p.name}`,W/2,120);
  ctx.font="bold 36px -apple-system,sans-serif";ctx.fillStyle="#8E8E93";ctx.fillText("PROGRESSION",W/2,168);

  if(!bestData.length){
    ctx.font="bold 36px -apple-system,sans-serif";ctx.fillStyle="#8E8E93";ctx.textAlign="center";ctx.fillText("Pas encore de données 📊",W/2,H/2);
    shareCanvas(canvas,`vtaper_progression.png`);return;
  }

  // Exercise name
  ctx.font="bold 48px -apple-system,sans-serif";ctx.fillStyle=color;ctx.textAlign="center";
  ctx.fillText(lib.name.length>30?lib.name.slice(0,30)+"…":lib.name,W/2,230);
  const first=bestData[0].mx;const last=bestData[bestData.length-1].mx;
  const diff=Math.round(((last-first)/first)*100);
  ctx.font="bold 80px -apple-system,sans-serif";ctx.fillStyle=diff>=0?"#30D158":"#FF3B30";ctx.textAlign="center";
  ctx.fillText(`${diff>=0?"+":""}${diff}%`,W/2,340);
  ctx.font="bold 32px -apple-system,sans-serif";ctx.fillStyle="#8E8E93";
  ctx.fillText(`${first}kg → ${last}kg depuis S${bestData[0].w}`,W/2,390);

  // Line chart
  const chartL=80,chartR=W-80,chartT=440,chartB=780;
  const chartW=chartR-chartL;const chartHh=chartB-chartT;
  const maxV=Math.max(...bestData.map(x=>x.mx));const minV=Math.min(...bestData.map(x=>x.mx));
  const range=maxV-minV||1;

  // Grid
  ctx.strokeStyle="#2C2C2E";ctx.lineWidth=1;
  for(let g=0;g<=4;g++){const y=chartT+chartHh*g/4;ctx.beginPath();ctx.moveTo(chartL,y);ctx.lineTo(chartR,y);ctx.stroke();
    const val=Math.round(maxV-range*g/4);ctx.font="22px -apple-system,sans-serif";ctx.fillStyle="#8E8E93";ctx.textAlign="right";ctx.fillText(`${val}kg`,chartL-10,y+8);}

  // Line gradient
  const grad=ctx.createLinearGradient(chartL,0,chartR,0);grad.addColorStop(0,color+"80");grad.addColorStop(1,color);
  ctx.strokeStyle=grad;ctx.lineWidth=6;ctx.lineJoin="round";ctx.lineCap="round";
  ctx.beginPath();
  bestData.forEach(({w,mx},i)=>{
    const x=chartL+(w-1)/(12-1)*chartW;const y=chartT+(1-(mx-minV)/range)*chartHh;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();

  // Area under line
  ctx.beginPath();
  bestData.forEach(({w,mx},i)=>{const x=chartL+(w-1)/(12-1)*chartW;const y=chartT+(1-(mx-minV)/range)*chartHh;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.lineTo(chartL+(bestData[bestData.length-1].w-1)/(12-1)*chartW,chartB);
  ctx.lineTo(chartL,chartB);ctx.closePath();
  const areaGrad=ctx.createLinearGradient(0,chartT,0,chartB);areaGrad.addColorStop(0,color+"30");areaGrad.addColorStop(1,color+"00");
  ctx.fillStyle=areaGrad;ctx.fill();

  // Data points
  bestData.forEach(({w,mx})=>{
    const x=chartL+(w-1)/(12-1)*chartW;const y=chartT+(1-(mx-minV)/range)*chartHh;
    ctx.beginPath();ctx.arc(x,y,10,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
    ctx.beginPath();ctx.arc(x,y,6,0,Math.PI*2);ctx.fillStyle="#0A0A0C";ctx.fill();
    ctx.font="bold 24px -apple-system,sans-serif";ctx.fillStyle="#F2F2F7";ctx.textAlign="center";ctx.fillText(`S${w}`,x,chartB+30);
  });

  // Current week highlight
  const curData=bestData.find(x=>x.w===week);
  if(curData){
    const cx2=chartL+(week-1)/(12-1)*chartW;const cy2=chartT+(1-(curData.mx-minV)/range)*chartHh;
    ctx.beginPath();ctx.arc(cx2,cy2,18,0,Math.PI*2);ctx.strokeStyle=color;ctx.lineWidth=3;ctx.stroke();
    ctx.font="bold 28px -apple-system,sans-serif";ctx.fillStyle=color;ctx.textAlign="center";
    ctx.fillText(`${curData.mx}kg`,cx2,cy2-30);
  }

  // Bottom stats
  ctx.strokeStyle="#2C2C2E";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(60,820);ctx.lineTo(W-60,820);ctx.stroke();
  const bstats=[{l:"DÉPART",v:`${first}kg`},{l:"ACTUEL",v:`${last}kg`},{l:"GAIN",v:`+${last-first}kg`}];
  bstats.forEach((b,i)=>{const x=60+(W-120)/3*i+(W-120)/6;ctx.font="bold 72px -apple-system,sans-serif";ctx.fillStyle=color;ctx.textAlign="center";ctx.fillText(b.v,x,920);ctx.font="bold 26px -apple-system,sans-serif";ctx.fillStyle="#8E8E93";ctx.fillText(b.l,x,960);});

  ctx.font="28px -apple-system,sans-serif";ctx.fillStyle="#ffffff20";ctx.textAlign="center";ctx.fillText("vtaper.app",W/2,H-20);
  shareCanvas(canvas,`vtaper_progression.png`);
}

function renderStats(){

  const exs=getDayExs(day);

    const lib=LIB.find(e=>e.id===ex.libId)||{name:"Exercice",measure:"weight+reps",muscle:""};

    const sets=ex.sets||3;
    let vol=0;const setDetails=[];
    for(let si=0;si<sets;si++){const w=parseFloat(getLog(lk(week,day,ei,si,"weight")))||0;const r=parseFloat(getLog(lk(week,day,ei,si,"reps")))||0;const t=getLog(lk(week,day,ei,si,"time"))||"";vol+=w*r;setDetails.push({w,r,t});}
    let prevVol=0;for(let si=0;si<sets;si++){const w=parseFloat(getLog(lk(week-1,day,ei,si,"weight")))||0;const r=parseFloat(getLog(lk(week-1,day,ei,si,"reps")))||0;prevVol+=w*r;}
    const mx=maxWeightEx(week,day,ei,sets);
    return{lib,mg,vol:Math.round(vol),prevVol:Math.round(prevVol),mx,setDetails,measure:lib.measure,ei};
  });

  // Weekly volume bar chart
  const weekVols=DAYS.map(d=>({d,vol:calcVol(week,d)}));
  const maxVol=Math.max(...weekVols.map(w=>w.vol),1);

  // Long-term: volume per session (all weeks) for a given day

  // Long-term max weight per exercise (across all weeks)

    }).filter(x=>x.mx>0);
    return perWeek.length?{libId,name:lib.name,data:perWeek}:null;
  }).filter(Boolean);

  // Sleep

      ${Array.from({length:12},(_,i)=>i+1).map(w=>{const ph=getPhase(w);const a=w===S.week;return`<button class="week-btn" onclick="G.statsSetWeek(${w})" style="background:${a?ph.color+"30":"#2C2C2E"};border-color:${a?ph.color:"transparent"};color:${a?ph.color:"#8E8E93"}">${w}</button>`;}).join("")}
    </div>

      ${DAYS.map((d,i)=>`<button onclick="G.statsSetDay(${i})" style="flex-shrink:0;padding:5px 10px;border-radius:16px;border:none;font-size:11px;font-weight:700;background:${i===S.day?"#4ECDC4":"#2C2C2E"};color:${i===S.day?"#111113":"#8E8E93"}">${d}</button>`).join("")}

      exVols.map(({lib,mg,vol,prevVol,mx,setDetails,measure})=>{

        return`<div class="stat-ex-row">
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${lib.name}</div>
            <div style="display:flex;align-items:center;gap:8px;margin-top:3px;flex-wrap:wrap">
              ${mg?`<span style="font-size:10px;font-weight:700;color:${mg.color}">${mg.label}</span>`:""}
              ${measure==="time"?`<span style="font-size:11px;color:#8E8E93">${setDetails.filter(s=>s.t).map((s,i)=>`S${i+1}:${s.t}`).join(" · ")||"—"}</span>`:
              `<span style="font-size:11px;color:#8E8E93">${setDetails.filter(s=>s.w||s.r).length}/${setDetails.length} séries</span>`}
            </div>
          </div>
          ${measure!=="time"?`<div style="text-align:right;flex-shrink:0;margin-left:10px">

    <div style="font-size:11px;color:#8E8E93;font-weight:700;letter-spacing:.6px;margin-bottom:8px">VOLUME PAR JOUR — SEMAINE ${week}</div>
    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;align-items:flex-end;gap:6px;height:70px;margin-bottom:4px">
        ${weekVols.map(({d,vol})=>{const h=maxVol>0?Math.max(4,Math.round((vol/maxVol)*60)):4;const isA=d===day;return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px"><div style="font-size:9px;color:#8E8E93">${vol>0?vol:""}</div><div style="width:100%;height:${h}px;background:${isA?"#4ECDC4":"#2C2C2E"};border-radius:4px 4px 0 0"></div></div>`;}).join("")}
      </div>
      <div style="display:flex;gap:6px">${weekVols.map(({d})=>`<div style="flex:1;text-align:center;font-size:9px;color:#8E8E93;font-weight:700">${d}</div>`).join("")}</div>
    </div>

    <!-- Long-term: Volume total par séance sur toutes les semaines -->
    ${ltVolData.length>=2?`
    <div style="font-size:11px;color:#8E8E93;font-weight:700;letter-spacing:.6px;margin-bottom:8px">PROGRESSION VOLUME — ${day} (toutes semaines)</div>
    <div class="card" style="margin-bottom:14px">
      ${(()=>{const maxV=Math.max(...ltVolData.map(x=>x.vol),1);return`<div style="display:flex;align-items:flex-end;gap:5px;height:70px;margin-bottom:4px">${ltVolData.map(({w,vol})=>{const h=Math.max(4,Math.round((vol/maxV)*60));const isA=w===week;return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px"><div style="font-size:9px;color:#8E8E93">${vol}</div><div style="width:100%;height:${h}px;background:${isA?"#FF6B35":"#2C2C2E"};border-radius:4px 4px 0 0"></div></div>`;}).join("")}</div><div style="display:flex;gap:5px">${ltVolData.map(({w})=>`<div style="flex:1;text-align:center;font-size:9px;color:#8E8E93">S${w}</div>`).join("")}</div>`;})()}
    </div>`:""}

    <!-- Long-term: poids max par exercice -->
    ${ltMaxWeight.length?`
    <div style="font-size:11px;color:#8E8E93;font-weight:700;letter-spacing:.6px;margin-bottom:8px">PROGRESSION POIDS MAX PAR EXERCICE</div>
    <div class="card" style="margin-bottom:14px">
      ${ltMaxWeight.map(({name,data})=>{
        const maxV=Math.max(...data.map(x=>x.mx),1);
        const first=data[0].mx;const last=data[data.length-1].mx;const diff=Math.round(((last-first)/first)*100);

            <div style="font-size:12px;font-weight:700;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</div>

          <div style="display:flex;align-items:flex-end;gap:4px;height:48px;margin-bottom:3px">

          </div>
          <div style="display:flex;gap:4px">${data.map(({w})=>`<div style="flex:1;text-align:center;font-size:8px;color:#8E8E93">S${w}</div>`).join("")}</div>

    <div class="card" style="margin-bottom:14px">
      ${S.isOwner?`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <div style="font-size:13px;color:#8E8E93;flex-shrink:0">S${week} ${day}</div>

function buildSleepCorr(){
  const results=[];
  const allExIds=[...new Set(DAYS.flatMap(d=>getDayExs(d).map(e=>e.libId)))];
  allExIds.slice(0,5).forEach(libId=>{
    const lib=LIB.find(e=>e.id===libId);if(!lib)return;
    const good=[],bad=[];
    DAYS.forEach(d=>{
      const exs=getDayExs(d);const ei=exs.findIndex(e=>e.libId===libId);if(ei<0)return;
      for(let w=1;w<=12;w++){const sh=S.statsData.sleep[`w${w}_${d}`];if(!sh)continue;const ws=[];for(let si=0;si<(exs[ei].sets||3);si++){const wv=parseFloat(getLog(lk(w,d,ei,si,"weight")));if(wv)ws.push(wv);}if(!ws.length)continue;const avg=ws.reduce((a,b)=>a+b)/ws.length;sh>=7?good.push(avg):bad.push(avg);}
    });
    if(!good.length||!bad.length)return;
    const ag=Math.round(good.reduce((a,b)=>a+b)/good.length*10)/10;const ab=Math.round(bad.reduce((a,b)=>a+b)/bad.length*10)/10;
    const diff=Math.round(((ag-ab)/ab)*100);
    results.push({name:lib.name,ag,ab,diff});
  });
  if(!results.length)return`<div style="font-size:12px;color:#8E8E93;text-align:center;padding:8px 0">Pas encore assez de données 🔬</div>`;
  return`<div style="margin-top:4px"><div style="font-size:11px;color:#8E8E93;font-weight:700;margin-bottom:8px">⚡ PERF vs SOMMEIL</div>${results.map(r=>`<div style="margin-bottom:8px"><div style="font-size:12px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.name}</div><div style="display:flex;gap:8px;align-items:center"><span style="font-size:11px;color:#30D158">🌙 ≥7h: <b>${r.ag}kg</b></span><span style="font-size:11px;color:#FF6B35">😴 &lt;7h: <b>${r.ab}kg</b></span><span style="margin-left:auto;font-size:11px;font-weight:700;color:${r.diff>=0?"#30D158":"#FF3B30"}">${r.diff>=0?"+":""}${r.diff}%</span></div></div>`).join("")}</div>`;
}

function buildLibList(day){
  const filter=S.libFilter;const list=filter?LIB.filter(e=>e.muscle===filter):LIB;
  if(!list.length)return`<div style="text-align:center;color:#8E8E93;padding:20px">Aucun exercice</div>`;
  function getML(m){return m==="weight+reps"?"🏋️ Poids+Reps":m==="reps"?"🔢 Reps":m==="time"?"⏱ Temps":m==="weight+time"?"🏋️ Poids+Temps":"";}
  return list.map(ex=>{const mg=MG.find(m=>m.id===ex.muscle);const ml=getML(ex.measure);return`<div class="lib-row" onclick="G.addExercise('${day}','${ex.id}')"><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:600;line-height:1.3">${ex.name}</div><div style="display:flex;gap:8px;margin-top:3px">${mg?`<span style="font-size:10px;font-weight:700;color:${mg.color}">${mg.label}</span>`:""}<span style="font-size:10px;color:#8E8E93">${ml}</span>${ex.tip?`<span style="font-size:10px;color:#8E8E93;font-style:italic">· ${ex.tip}</span>`:""}</div></div><div style="font-size:22px;color:#4ECDC4;font-weight:700;margin-left:10px">+</div></div>`;}).join("");
}

function renderMealBuilder(){
  const mc=document.getElementById("modal-container");if(!mc)return;
  const totKcal=_mealIngredients.reduce((a,i)=>a+(i.kcal*i.grams/100),0);

  const totCarb=_mealIngredients.reduce((a,i)=>a+(i.carb*i.grams/100),0);
  const totFat=_mealIngredients.reduce((a,i)=>a+(i.fat*i.grams/100),0);
  const totalIngGrams=_mealIngredients.reduce((a,i)=>a+i.grams,0);
  // Portion calculation
  const cookedW=_mealCookedWeight||0;
  const portionW=_mealPortionWeight||0;
  const ratio=cookedW>0&&portionW>0?portionW/cookedW:1;
  const portionKcal=Math.round(totKcal*ratio);
  const portionProt=Math.round(totProt*ratio);
  const portionCarb=Math.round(totCarb*ratio);
  const portionFat=Math.round(totFat*ratio);

  mc.innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal-box">
    <div class="modal-header">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">

        <button onclick="closeModal()" style="background:#2C2C2E;border:none;border-radius:10px;padding:7px 14px;color:#F2F2F7;font-size:13px;font-weight:600">✕</button>
      </div>

    </div>
    <div class="modal-body">

      <!-- Total brut ingrédients -->
      ${_mealIngredients.length?`
      <div style="background:#111113;border-radius:10px;padding:10px 12px;margin-bottom:10px">
        <div style="font-size:10px;color:#8E8E93;font-weight:700;margin-bottom:6px">TOTAL INGRÉDIENTS CRUS</div>
        <div style="display:flex;gap:10px;align-items:center">
          <div><div style="font-size:20px;font-weight:700;color:#F59E0B">${Math.round(totKcal)} kcal</div><div style="font-size:10px;color:#8E8E93">${totalIngGrams}g total</div></div>
          <div style="display:flex;gap:8px;margin-left:auto">
            <div style="text-align:center"><div style="font-size:13px;font-weight:700;color:#FF6B35">${Math.round(totProt)}g</div><div style="font-size:9px;color:#8E8E93">P</div></div>
            <div style="text-align:center"><div style="font-size:13px;font-weight:700;color:#4ECDC4">${Math.round(totCarb)}g</div><div style="font-size:9px;color:#8E8E93">G</div></div>
            <div style="text-align:center"><div style="font-size:13px;font-weight:700;color:#F59E0B">${Math.round(totFat)}g</div><div style="font-size:9px;color:#8E8E93">L</div></div>
          </div>
        </div>
      </div>

      <!-- Poids plat cuit + portion -->
      <div style="background:#1C1C1E;border-radius:10px;padding:10px 12px;margin-bottom:12px;border:1px solid #2C2C2E">
        <div style="font-size:10px;color:#8E8E93;font-weight:700;margin-bottom:8px">🍳 APRÈS CUISSON</div>
        <div style="display:flex;gap:10px;margin-bottom:8px;align-items:center">
          <div style="flex:1">
            <div style="font-size:10px;color:#8E8E93;margin-bottom:4px">Poids total plat cuit</div>
            <div style="display:flex;align-items:center;gap:6px">
              <input type="number" id="cooked-w" placeholder="ex: 600" value="${cookedW||""}" min="1" max="5000"
                oninput="_mealCookedWeight=parseFloat(this.value)||0;renderMealBuilder()"
                style="width:80px;background:#111113;border:1px solid #2C2C2E;border-radius:8px;color:#F2F2F7;font-size:13px;font-weight:700;text-align:center;padding:6px;outline:none"/>
              <span style="font-size:11px;color:#8E8E93">g</span>
            </div>
          </div>
          <div style="flex:1">
            <div style="font-size:10px;color:#8E8E93;margin-bottom:4px">Ma portion mangée</div>
            <div style="display:flex;align-items:center;gap:6px">
              <input type="number" id="portion-w" placeholder="ex: 300" value="${portionW||""}" min="1" max="5000"
                oninput="_mealPortionWeight=parseFloat(this.value)||0;renderMealBuilder()"
                style="width:80px;background:#111113;border:1px solid #2C2C2E;border-radius:8px;color:#F2F2F7;font-size:13px;font-weight:700;text-align:center;padding:6px;outline:none"/>
              <span style="font-size:11px;color:#8E8E93">g</span>
            </div>
          </div>
        </div>
        ${cookedW>0&&portionW>0?`
        <div style="background:#4ECDC420;border-radius:8px;padding:8px 10px;border:1px solid #4ECDC440">
          <div style="font-size:10px;color:#4ECDC4;font-weight:700;margin-bottom:4px">MA PORTION (${portionW}g = ${Math.round(ratio*100)}% du plat)</div>
          <div style="display:flex;gap:12px;align-items:center">
            <div style="font-size:20px;font-weight:700;color:#4ECDC4">${portionKcal} kcal</div>
            <div style="display:flex;gap:8px;margin-left:auto">
              <div style="text-align:center"><div style="font-size:12px;font-weight:700;color:#FF6B35">${portionProt}g</div><div style="font-size:9px;color:#8E8E93">P</div></div>
              <div style="text-align:center"><div style="font-size:12px;font-weight:700;color:#4ECDC4">${portionCarb}g</div><div style="font-size:9px;color:#8E8E93">G</div></div>

        </div>`:`<div style="font-size:11px;color:#8E8E93;font-style:italic">Pèse le plat cuit puis ta portion pour un calcul précis 🎯</div>`}
      </div>`:""}

      <!-- Ingrédients ajoutés -->
      ${_mealIngredients.map((ing,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #1E1E20">
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${ing.name}</div>
          <div style="font-size:10px;color:#8E8E93">${ing.grams}${ing.unit||"g"} → ${Math.round(ing.kcal*ing.grams/100)}kcal · P:${Math.round(ing.prot*ing.grams/100)}g</div>
        </div>
        <input type="number" value="${ing.grams}" min="1" max="5000"
          style="width:54px;background:#111113;border:1px solid #2C2C2E;border-radius:8px;color:#F2F2F7;font-size:13px;font-weight:700;text-align:center;padding:5px;outline:none"
          onchange="G.updateMealIngGrams(${i},this.value)"/>
        <span style="font-size:10px;color:#8E8E93;flex-shrink:0">${ing.unit||"g"}</span>
        <button onclick="G.removeMealIng(${i})" style="background:#2C2C2E;border:none;border-radius:7px;padding:4px 8px;color:#8E8E93;font-size:11px;flex-shrink:0">✕</button>
      </div>`).join("")}

      <!-- Recherche ingrédient -->
      <div style="margin:10px 0 6px;font-size:11px;color:#8E8E93;font-weight:700">AJOUTER UN INGRÉDIENT</div>
      <div style="position:relative;margin-bottom:8px">
        <input class="modal-input" id="ing-search" placeholder="Ex: escalope poulet, riz, brocoli, huile..." oninput="G.mealIngSearch(this.value)" style="margin:0;padding-right:40px"/>
        <div id="ing-loading" style="display:none;position:absolute;right:12px;top:50%;transform:translateY(-50%)"><div style="width:16px;height:16px;border:2px solid #2C2C2E;border-top-color:#4ECDC4;border-radius:50%;animation:spin 0.8s linear infinite"></div></div>
      </div>
      <div id="ing-results">${buildMealIngResults("")}</div>

      <!-- Boutons action -->
      ${_mealIngredients.length?`
        <div style="display:flex;gap:8px;margin-top:14px">
          <button onclick="G.logMealNow()" style="flex:1;padding:12px;border-radius:12px;border:none;background:#2C2C2E;color:#F2F2F7;font-size:13px;font-weight:700">Ajouter au journal</button>
          ${_mealName?`<button onclick="G.saveMeal()" style="flex:1;padding:12px;border-radius:12px;border:none;background:#4ECDC4;color:#111113;font-size:13px;font-weight:700">💾 Sauvegarder</button>`:""}
        </div>`:""}
    </div>
  </div></div>`;
}

function buildMealIngResults(q){
  const results=q.trim()?searchFoodLocal(q):FOOD_DB.slice(0,12);
  if(!results.length)return`<div style="text-align:center;color:#8E8E93;padding:12px;font-size:13px">Aucun résultat</div>`;
  return results.map(f=>`<div class="food-row" onclick="G.addMealIng('${f.id}')" style="cursor:pointer">
    <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${f.name}</div><div style="font-size:11px;color:#8E8E93">${f.kcal}kcal · P:${f.prot}g / 100${f.unit||"g"}</div></div>
    <div style="font-size:20px;color:#4ECDC4;font-weight:700;margin-left:10px">+</div>
  </div>`).join("");
}

let foodSearchTimer=null;
window.G={
  startTimer,stopTimer,togglePause,
  setTab(id){S.tab=id;updateNav();if(id==="home")renderHome();else if(id==="workout")renderWorkout();else if(id==="nutrition")renderNutrition();else if(id==="stats")renderStats();},
  setWeek(w){S.week=w;renderWorkout();},
  statsSetWeek(w){S.week=w;renderStats();},
  statsSetDay(i){S.day=i;renderStats();},
  setDay(i){
    S.day=i;
    if(S.tab==="workout"){const sc=document.getElementById("scroll-content");const sy=sc?sc.scrollTop:0;renderWorkoutContent();if(sc)requestAnimationFrame(()=>{sc.scrollTop=sy;});}
  },
  toggleDone(day,ei){
    if(!S.isOwner)return;
    const sc=document.getElementById("scroll-content");const sy=sc?sc.scrollTop:0;
    const k=lk(S.week,day,ei,0,"done");setLog(k,getLog(k)?"":"1");
    renderWorkoutContent();if(sc)requestAnimationFrame(()=>{sc.scrollTop=sy;});
  },
  logInput(week,day,ei,si,field,val){if(!S.isOwner)return;setLog(lk(week,day,ei,si,field),val);},
  changeSets(day,ei,delta){if(!S.isOwner)return;const sc=document.getElementById("scroll-content");const sy=sc?sc.scrollTop:0;const exs=[...getDayExs(day)];exs[ei].sets=Math.max(1,Math.min(8,(exs[ei].sets||3)+delta));setDayExs(day,exs);renderWorkoutContent();if(sc)requestAnimationFrame(()=>{sc.scrollTop=sy;});},
  changeReps(day,ei,delta){if(!S.isOwner)return;const sc=document.getElementById("scroll-content");const sy=sc?sc.scrollTop:0;const exs=[...getDayExs(day)];exs[ei].reps=Math.max(1,Math.min(50,(exs[ei].reps||10)+delta));setDayExs(day,exs);renderWorkoutContent();if(sc)requestAnimationFrame(()=>{sc.scrollTop=sy;});},
  removeExercise(day,ei){if(!S.isOwner)return;const sc=document.getElementById("scroll-content");const sy=sc?sc.scrollTop:0;const exs=[...getDayExs(day)];exs.splice(ei,1);setDayExs(day,exs);renderWorkoutContent();if(sc)requestAnimationFrame(()=>{sc.scrollTop=sy;});},
  openLibrary(day){if(!S.isOwner)return;S.libFilter=null;S._libDay=day;renderLibModal(day);},
  setLibFilter(m){S.libFilter=m;const el=document.getElementById("lib-list");if(el)el.innerHTML=buildLibList(S._libDay);},
  addExercise(day,libId){const exs=[...getDayExs(day)];exs.push({libId,sets:3,reps:10});setDayExs(day,exs);closeModal();const sc=document.getElementById("scroll-content");const sy=sc?sc.scrollTop:0;renderWorkoutContent();if(sc)requestAnimationFrame(()=>{sc.scrollTop=sy;});},
  // Nutrition
  setGoal(g){if(!S.isOwner)return;S.nutritionData.profile.goal=g;nutSched();renderNutrition();},
  setNP(key,val){if(!S.isOwner)return;S.nutritionData.profile[key]=isNaN(val)||val===""?val:parseFloat(val);nutSched();if(["weight","height","age","sex","activity"].includes(key))renderNutrition();},
  openFoodSearch,
  openManualFood,
  openMealBuilder,
  async doFoodSearch(val){
    clearTimeout(foodSearchTimer);
    const el=document.getElementById("fresults");if(!el)return;
    if(!val.trim()){el.innerHTML=buildFoodCategoryBrowse();return;}
    el.innerHTML=`<div style="text-align:center;padding:16px"><div class="spinner"></div></div>`;
    foodSearchTimer=setTimeout(async()=>{
      const results=await searchFood(val);
      const el2=document.getElementById("fresults");if(!el2)return;
      if(!results.length){el2.innerHTML=`<div style="text-align:center;color:#8E8E93;padding:20px;font-size:13px">Aucun résultat<br><span style="font-size:11px">Essaie en anglais ou utilise la saisie manuelle</span></div>`;return;}
      window._foodResults=results;
      el2.innerHTML=results.map((f,i)=>buildFoodRow(f,`G.pickFood('${f.id||"r"+i}')`)).join("");
      window._foodResultsMap={};results.forEach((f,i)=>{window._foodResultsMap[f.id||"r"+i]=f;});
    },400);
  },
  pickFood(fid){
    // Look in FOOD_DB first, then _foodResultsMap
    const f=FOOD_DB.find(x=>x.id===fid)||(window._foodResultsMap||{})[fid];if(!f)return;
    closeModal();
    const mc=document.getElementById("modal-container");
    mc.innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal-box" style="padding:24px 20px 32px" onclick="event.stopPropagation()">
      <div style="font-size:16px;font-weight:700;margin-bottom:4px">${f.name}</div>
      <div style="font-size:12px;color:#8E8E93;margin-bottom:16px">${f.kcal}kcal · P:${f.prot}g · G:${f.carb}g · L:${f.fat}g / 100${f.unit||"g"}</div>
      <div style="font-size:12px;color:#8E8E93;margin-bottom:6px;font-weight:600">QUANTITÉ</div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
        <input type="number" id="fg" value="100" min="1" max="5000" class="modal-input" style="margin:0;width:100px;text-align:center" oninput="document.getElementById('fkcal').textContent=Math.round(${f.kcal}*this.value/100)+' kcal'"/>
        <span style="font-size:14px;color:#8E8E93">${f.unit||"g"}</span>
        <div style="margin-left:auto;text-align:right"><div id="fkcal" style="font-size:20px;font-weight:700;color:#F59E0B">${f.kcal} kcal</div><div style="font-size:11px;color:#8E8E93">estimé</div></div>
      </div>
      <button class="btn-primary" style="background:#4ECDC4;color:#111113" onclick="G.confirmFoodObj(${JSON.stringify(f).replace(/"/g,'&quot;')})">Ajouter au journal</button>
      <button class="btn-secondary" onclick="closeModal()">Annuler</button>
    </div></div>`;
  },
  confirmFoodObj(f){
    const g=parseFloat(document.getElementById("fg")?.value)||100;
    const today=todayKey();if(!S.nutritionData.foodLog[today])S.nutritionData.foodLog[today]=[];
    S.nutritionData.foodLog[today].push({...f,grams:g});
    nutSched();closeModal();renderNutrition();
  },
  // Meal builder
  mealIngSearch(val){
    const el=document.getElementById("ing-results");
    const ld=document.getElementById("ing-loading");
    if(!el)return;
    // Show local results immediately
    el.innerHTML=buildMealIngResults(val);
    if(!val.trim())return;
    // Then async USDA search
    clearTimeout(_ingSearchTimer);
    if(ld)ld.style.display="flex";
    _ingSearchTimer=setTimeout(async()=>{
      const usda=await searchUSDA(val);
      if(ld)ld.style.display="none";
      const ingEl=document.getElementById("ing-results");if(!ingEl)return;
      const local=searchFoodLocal(val);
      const combined=[...local,...usda.filter(u=>!local.some(l=>l.name.toLowerCase().slice(0,15)===u.name.toLowerCase().slice(0,15)))];
      if(!combined.length){ingEl.innerHTML=`<div style="text-align:center;color:#8E8E93;padding:12px;font-size:13px">Aucun résultat — essaie en anglais</div>`;return;}
      window._ingResults=combined;
      ingEl.innerHTML=combined.map((f,i)=>`<div class="food-row" onclick="G.addMealIngByIdx(${i})" style="cursor:pointer">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${f.name}</div>
          <div style="display:flex;gap:6px;margin-top:2px;align-items:center">
            <span style="font-size:10px;font-weight:700;color:${f.source==="usda"?"#A855F7":f.source==="off"?"#FF6B35":"#4ECDC4"}">${f.source==="usda"?"USDA":f.source==="off"?"Emballé":"Base FR"}</span>
            <span style="font-size:11px;color:#8E8E93">${f.kcal}kcal · P:${f.prot}g · G:${f.carb}g · L:${f.fat}g / 100g</span>
          </div>
        </div>
        <div style="font-size:20px;color:#4ECDC4;font-weight:700;margin-left:10px">+</div>
      </div>`).join("");
    },500);
  },
  addMealIngByIdx(idx){
    const f=(window._ingResults||[])[idx];if(!f)return;
    _mealIngredients.push({...f,grams:100});
    renderMealBuilder();
  },
  addMealIng(fid){
    const f=FOOD_DB.find(x=>x.id===fid);if(!f)return;
    _mealIngredients.push({...f,grams:100});
    renderMealBuilder();
  },
  updateMealIngGrams(idx,val){_mealIngredients[idx].grams=parseFloat(val)||100;renderMealBuilder();},
  removeMealIng(idx){_mealIngredients.splice(idx,1);renderMealBuilder();},
  logMealNow(){
    if(!_mealIngredients.length)return;
    const name=_mealName||"Plat cuisiné";
    const totKcal=_mealIngredients.reduce((a,i)=>a+(i.kcal*i.grams/100),0);
    const totProt=_mealIngredients.reduce((a,i)=>a+(i.prot*i.grams/100),0);
    const totCarb=_mealIngredients.reduce((a,i)=>a+(i.carb*i.grams/100),0);
    const totFat=_mealIngredients.reduce((a,i)=>a+(i.fat*i.grams/100),0);
    const totalIngGrams=_mealIngredients.reduce((a,i)=>a+i.grams,0);
    // If cooked weight + portion specified → use ratio for precise calculation
    const cookedW=_mealCookedWeight;const portionW=_mealPortionWeight;
    const ratio=cookedW>0&&portionW>0?portionW/cookedW:1;
    const finalGrams=portionW||totalIngGrams;
    const entry={
      name,
      kcal:(totKcal/totalIngGrams)*100, // normalize to per 100g
      prot:(totProt/totalIngGrams)*100,
      carb:(totCarb/totalIngGrams)*100,
      fat:(totFat/totalIngGrams)*100,
      grams:finalGrams,
      isMeal:true,
      portionInfo:cookedW>0&&portionW>0?`${portionW}g / ${cookedW}g cuit`:null,
    };
    const today=todayKey();if(!S.nutritionData.foodLog[today])S.nutritionData.foodLog[today]=[];
    S.nutritionData.foodLog[today].push(entry);
    nutSched();closeModal();renderNutrition();
  },
  saveMeal(){
    if(!_mealIngredients.length||!_mealName)return;
    const totKcal=_mealIngredients.reduce((a,i)=>a+(i.kcal*i.grams/100),0);
    const totProt=_mealIngredients.reduce((a,i)=>a+(i.prot*i.grams/100),0);
    const totCarb=_mealIngredients.reduce((a,i)=>a+(i.carb*i.grams/100),0);
    const totFat=_mealIngredients.reduce((a,i)=>a+(i.fat*i.grams/100),0);
    const totalGrams=_mealIngredients.reduce((a,i)=>a+i.grams,0);
    const meal={name:_mealName,kcal:totKcal/(totalGrams/100),prot:totProt/(totalGrams/100),carb:totCarb/(totalGrams/100),fat:totFat/(totalGrams/100),grams:totalGrams,isMeal:true,ingredients:[..._mealIngredients]};
    if(!S.nutritionData.savedMeals)S.nutritionData.savedMeals=[];
    S.nutritionData.savedMeals.push(meal);
    G.logMealNow();
  },
  addSavedMeal(idx){
    const m=S.nutritionData.savedMeals[idx];if(!m)return;
    const today=todayKey();if(!S.nutritionData.foodLog[today])S.nutritionData.foodLog[today]=[];
    S.nutritionData.foodLog[today].push({...m});
    nutSched();renderNutrition();
  },
  addManualFood(){
    const name=document.getElementById("mf-name")?.value.trim();if(!name)return;
    const kcal=parseFloat(document.getElementById("mf-kcal")?.value)||0;
    const prot=parseFloat(document.getElementById("mf-prot")?.value)||0;
    const carb=parseFloat(document.getElementById("mf-carb")?.value)||0;
    const fat=parseFloat(document.getElementById("mf-fat")?.value)||0;
    const grams=parseFloat(document.getElementById("mf-grams")?.value)||100;
    const today=todayKey();if(!S.nutritionData.foodLog[today])S.nutritionData.foodLog[today]=[];
    S.nutritionData.foodLog[today].push({name,kcal,prot,carb,fat,grams,source:"manual"});
    nutSched();closeModal();renderNutrition();
  },
  removeFood(idx){if(!S.isOwner)return;const today=todayKey();S.nutritionData.foodLog[today].splice(idx,1);nutSched();renderNutrition();},
  // Stats
  setSleep(key,val){if(!S.isOwner||isNaN(val))return;S.statsData.sleep[key]=val;statsSched();renderStats();},
  // Delete
  showDeleteConfirm(){
    const app=document.getElementById("app");if(document.getElementById("del-ov"))return;
    const ov=document.createElement("div");ov.id="del-ov";ov.className="modal-overlay";
    ov.innerHTML=`<div class="modal-box" style="padding:24px 20px 32px" onclick="event.stopPropagation()"><div style="text-align:center;margin-bottom:16px"><div style="font-size:40px;margin-bottom:12px">🗑️</div><div style="font-size:18px;font-weight:700;margin-bottom:8px">Supprimer mon profil ?</div><div style="font-size:13px;color:#8E8E93;line-height:1.5">Toutes les données seront <strong style="color:#FF3B30">définitivement supprimées</strong>.</div></div><button class="btn-primary" id="del-btn" style="background:#FF3B30" onclick="G.confirmDelete()">Oui, supprimer définitivement</button><button class="btn-secondary" onclick="document.getElementById('del-ov').remove()">Annuler</button></div>`;
    app.appendChild(ov);
  },
  async confirmDelete(){
    const btn=document.getElementById("del-btn");if(btn){btn.textContent="Suppression...";btn.disabled=true;}
    try{
      await deleteProfile(S.currentProfile.id);S.profiles=S.profiles.filter(p=>p.id!==S.currentProfile.id);
      S.currentProfile=null;S.isOwner=false;S.workoutData={days:{},logs:{}};S.nutritionData={profile:{},foodLog:{}};S.statsData={sleep:{}};
      S.tab="home";renderShell();updateNav();renderHome();
    }catch(e){if(btn){btn.textContent="Erreur";btn.disabled=false;}}
  },
};

window.renderHome=renderHome;window.closeModal=closeModal;window.openShareModal=openShareModal;window.FOOD_DB=FOOD_DB;window.buildFoodCategoryBrowse=buildFoodCategoryBrowse;window.buildFoodRow=buildFoodRow;window.buildMealIngResults=buildMealIngResults;window._mealIngredients=_mealIngredients;window.searchFoodLocal=searchFoodLocal;window.renderMealBuilder=renderMealBuilder;window.searchUSDA=searchUSDA;

/* ── INIT ── */
async function init(){
  try{
    S.profiles=await loadProfiles();
  }catch(e){
    console.error("loadProfiles failed",e);
    S.profiles=[];
  }
  try{
    renderShell();updateNav();renderHome();
  }catch(e){
    console.error("render failed",e);
    document.getElementById("app").innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;padding:20px;text-align:center"><div style="font-size:32px">⚠️</div><div style="font-size:15px;color:#F2F2F7">Erreur au démarrage</div><div style="font-size:12px;color:#8E8E93">${e.message}</div><button onclick="location.reload()" style="background:#4ECDC4;border:none;border-radius:12px;padding:12px 24px;color:#111113;font-size:14px;font-weight:700;margin-top:8px">Réessayer</button></div>`;
  }
}
init();
if("serviceWorker"in navigator){const sw=`self.addEventListener('install',()=>self.skipWaiting());self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>new Response('',{status:503}))))`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:"application/javascript"}))).catch(()=>{});}
</script>
